body:
  text: 侍者興燈録師還山福城衆護法宰官四衆請上堂屴崱峯頭雲一片乘風飛去又飛來作霖作雨渾間事惹得虗空笑滿腮且道笑箇什麼良久云我行荒草裏渠又入深村卓拄杖下座林浦衆護法居士請上堂住山十四年去山年十四去住了無蹤原不在別處且道在甚麼處良久云今日靈山一會儼然未散下座汝洪監寺請上堂師拈拄杖云老僧十數年東漂西泊佛國魔宮羊腸鳥道無不經歷來惟憑這箇木上座行與同行坐與同坐全得他力且道得力一句作麼生會麼時時扶過斷橋水處處伴歸明月村卓一卓下座龍江衆居士請上堂龍江衆道友一別十餘年今日重相見道愛尤藹然虔修香積供請我啓法筵愧余無法説何以答高賢記得昔日僧問馬祖如何是佛祖云即心是佛一日又云非心非佛後來南泉和尚云不是心不是佛不是物大衆馬祖南泉三語還有親疏也無若揀辨得明白許渠入門如或不然不免道破親則總親疏則總疏為什麼總疏我王庫中無如是寶刀雖然如是只如南泉道不是心不是佛不是物畢竟是箇甚麼大衆會麼觀河不改初年見謾道昔人非昔人僧綱亦能上座領諸山請上堂鼓山不露頂一切塵中現處處得相逢佛眼覷不見既相逢為甚麼不見會麼石女登機音軋軋木人打鼓韻鼕鼕弟子太充太圓請上堂一十四年前金烏玉兔茫茫去一十四年後夢境空花疊疊來正當今日如天普蓋似地普擎如日普照若風普吹一法清淨一切法清淨一法平等一切法平等一法究竟一切法究竟所謂一切智智清淨無二無二分無別無斷故正當恁麼時歸家穩坐一句作麼生匝地紅輪秀海底不栽花珍重福城善男子鄭子迪伯琴子梁太馨孟熙等滿懺蘭盆普度請上堂聲前一著千聖莫窺末後一機萬靈罔措當陽一句覿面施呈乃豎拂子召大衆云即此用離此用三千里外逢人不得錯舉喝一喝復云盂蘭大教採菽真風十載修崇一朝滿懺福存亡之父母度法界之衆生此乃福城善男子鄭子迪等一門親屬同心同願布此津梁實謂希有也雖然如是只如祖師道父母非我親誰是最親者諸佛非我道誰是最道者正當恁麼時父母未生已前生佛未形之際如何通得箇消息去良久云但有好風來席上更無間語落人間珍重師七旬寶善常新大師請上堂今朝八月十五撾動喧空石鼓月中桂子飄香天外清風入戶不須普化搖鈴安用雲門道普從來法法現成一任西秦東魯大衆會麼長江日夜向東流這裏何曾有今古喝一喝下座延平諸山雨千體如啓然頂生諸公請上堂僧問昔日那吒太子析骨還父析肉還母然後現本身為父母説法請問如何是本身師云父母未生前會取進云未審説甚麼法師云清風拂白月進云和尚今日説法與那吒太子是同是別師云腳跟下莫教錯過好乃云夢幻泡沫身記年已七十諸公慶賀來空中尋鳥迹迹迹合虗空空空含鳥迹空迹兩悠悠非虗亦非實唯有舜若多却與渠相識且道相識一句作麼生良久云不識不識便下座福城方憲副夫人趙氏法名傳溥偕男方京法名興蔭請上堂師云香雲篆彩燭𦦨交輝鐘鼓雷鳴龍象雲集無量壽如來與大衆轉大法輪向道人人赤肉團上壁立萬仞巍巍然仰之彌高昭昭然覷之不及徹威音之先貫樓至之後忽有箇漢向這裏直下知歸如空合空似水投水了無縫隙即與無量壽同年同日蓋古蓋今越數量之門登仁壽之域未為分外如或未然不免傍通一線拈拄杖卓一卓云只這箇黑漆漆明歷歷常在閙市中要且無人識且道渠壽多少良久云年年九月九遍地菊花開又卓一卓下座白雲無己禪師請上堂空界無人孰彼孰己化儀有準立君立臣臣轉位以朝君君埀拱以視臣君臣道合花開枯木之春理量雙消雲盡碧天之影雖然如是猶是功勳邊事向上一句作麼生震聲一喝云切忌道著莫海頴優婆夷圓頂請上堂莫婆素具離塵志待我還山逾十年此日金刀才舉處團團頂相已周圓大衆這箇無見頂相孤逈逈卓巍巍直饒九地菩薩上觀四十二恆河沙世界諦觀不見況其他耶雖然如是且看放光如來為諸人通箇消息拈拄杖云喚作拄杖則觸不喚作拄杖則背畢竟喚作甚麼良久云秋香滿院庭前桂晚韻千山頂上松卓一卓下座延平尼太穆請上堂如來所説身相即非身相這箇殼漏子是箇甚麼陽𦦨空花雖然如是今日太穆菴主遠來設齋慶壽誰為壽誰為慶壽者會麼石女巧炊無米飯殷勤供養不飢人彝白祖信二上人請上堂古者道識得一萬事畢如何是一早已落二落三了也忽有箇漢向這裏直下知歸自然天清地寧國王長壽萬姓康阜雖然如是衲僧分上又作麼生喝一喝下座心照上人請上堂僧問本無迷悟人只要今日了今日作麼生了師便喝僧禮拜云謝師指示師云汝作麼生了僧無語師便打乃云石人與石女長年相對語句句説無生遍界雨法雨所謂一地所生一雨所潤三草二木各得增長只如無陰陽地上無影樹子還雨得著麼良久云山花不用栽培力自有春風管待伊靈石梵珠默雪履圓衆上座請上堂僧問佛身無為不墮諸數如何是不落數量一句師云長江水自流進云恁麼則和尚與虗空同年去也師云虗空向汝道甚麼僧便喝師云好與三十棒乃云石鼓山頭屴崱峯長年藏在白雲中朝朝暮暮無人見今日依稀露半容大衆還見儂家面目麼良久云將謂阿彌陀元是無量壽弟子太充太圓請上堂僧問十方諸佛同讚無量壽未審無量壽以何為身師云山河大地進云以何為壽師云大地山河進云以何為國土師云山河山河大地大地僧問生而無生不是無生而説無生請問如何是生而無生之理師云木人撫掌石女呵呵僧云將謂阿彌陀元是無量壽師云不妨恁麼道乃云身心一如身外無餘敲空中石鼓採火裏芙蕖一毛含無盡法界一步歷恆沙佛土一音演無量法門一念包三世無際不是神通妙用亦非法爾如然乃當人自性之常分耳今日弟子太充太圓特來山中廣設香饈大作佛事為老僧祝壽且道壽作麼生祝良久云將此深心奉塵剎是則名為報佛恩福城各菴弟子祝壽請上堂金烏玉兔忙追逐催盡古今人白頭惟有虗空常不老包天裹地自無憂忽有問虗空年多少但道打破虗空來向汝道福城諸山弟子請上堂僧問一切法門無盡海同會一法道場中如何是一法師云萬象歷然進云便恁麼流通去也師云流通一句作麼生進云但見皇風成一片不知何處覔封疆便禮拜師乃云世尊誕生雲門行棒老僧誕生諸山供養一則揚聲止響一則空中彩畫若向這裏領荷得去自然正不立玄偏不附物常在動用中動用中收不得正當恁麼時應時納祐一句如何道一陽將復處萬物盡含春福城衆護法宰官居士請上堂三緣和合之謂身如何是真身歲月續似之謂壽如何是真壽須知真身無相非因緣之所生真壽不遷豈數量之可計彌綸萬有而不覩其形貫滿十虗而莫窮其際雖然如是今日福城衆位大護法宰官居士為老僧七旬初度親到山中敷燈王之寶座修香積之妙供集五百之應真請壽量之法門金章玉句鏗鏘覺苑林巒奪目綵屏燦爛性天星斗正當恁麼時因齋慶讚一句如何道箇箇壽山高屴崱人人福海涌靈源珍重溫陵開元寺石航緑蘊衆上座請上堂今日大風怒號林巒震吼泉南開元寺裏一百二十院老古錐已為諸人舌根拖地大轉法輪了也石航緑蘊二公又約衆到山請老僧開甘露門説壽量品只如壽量二字如何商量盡大地衆生自撞出母胎以來多方鞠育從孩孺以至長成從長成以至老死念念生求其生相不可得念念滅求其滅相不可得只此不可得是當人金剛正體今古常如不變不易如是壽量豈塵點劫數所可論量耶雖然如是且道老僧恁麼道與從上百二十院老古錐説底相去幾何良久云落霞與孤鶩齊飛秋水共長天一色怡然若松二上座請上堂人間花甲子世相妄推遷一句為君盡剎那是大年所以三世諸佛歷代祖師以及天下老和尚盡在剎那際裏説法利生至今猶未起在只如剎那義作麼生商量知麼才生不可得不貴未生前溫陵慈門上人請上堂僧問昔日花開即不問今朝果熟事如何師云果在什麼處進云唯此一事實餘二則非真師云猶未熟在僧問雪覆千山為甚麼孤峯不白師云不與衆同流僧禮拜師拈拄杖云日日釋迦出世時時彌勒誕生且道這箇木上座幾時出世幾時誕生良久云常在闤闠中從來不合伴卓一卓云珍重實彩上人請上堂古教道一切法不生一切法不滅若能如是解諸佛常現前鼓山則不然諸法念念生諸法念念滅若能如是解諸佛常現前大衆古教教人於不生滅處見佛鼓山教人於生滅處見佛且道生滅與不生不滅是同是別良久云空外之青山善走江間之白浪不流下座同參上人請上堂有相身中無相身謾將歲月較疏親直饒八萬四千劫子細看來過隙塵雖然如是只如今日同參上人遠來設供慶讚一句作麼生金果早朝猿摘去玉花晚後鳳銜來慈門上人領衆求戒請上堂大衆遠來求戒為壇場是戒耶問清淨是戒耶三説羯磨是戒耶乃至教威儀著袈裟乞食是戒耶喝一喝云是非已去了是非裏薦取懸鏡上人領衆求戒請上堂戒性如虗空持者為迷倒若人會得如空戒性則知威音王已前受戒竟不假三師羯磨何煩七證揀非如或未然細刮龜毛搓索子緊把虗空縛一場直待通身流白汗方如好肉本無瘡德淡上人領衆求戒請上堂持犯但束身非身無所束如何是身如何是非身身與非身是一是二豈不見釋迦老子道如來所説身相即非身相如是則如來所説戒相即非戒相受者如是而受受無所受持者如是而持持無所持五篇七聚無非文殊妙門著衣展鉢盡是舍那心地還有恁麼人麼若有堪報不報之恩足了未了之事令法久住壽佛慧命如或未然且教順朱去梵音忍茂二上人求戒請上堂人人有箇本源自性清淨戒圓滿具足無欠無餘逼塞虗空充滿正報且道箇中誰受誰學誰修誰證大衆知麼自攜瓶去沽村酒又著衫來作主人同參上人領衆求戒請上堂僧問戒性人人本有為甚麼又要受戒師云若不受戒焉知本有進云恁麼則龜毛索子緊縛虗空去也師云汝還縛得著麼僧擬議師便打乃卓拄杖云天人羣生類皆承此恩力且道此是甚麼若喚作佛相好難形喚作法詮顯不出喚作僧非和合相喚作戒無非可防且道畢竟是箇甚麼良久云野老不知堯舜力鼕鼕打鼓祭江神又卓一卓下座性空性質寂理三位上人領衆求戒請上堂昔日先師老和尚開戒親垂三問當時答者固多契機者少滅度以來已三十載此問鮮有知之者今日不免為大衆從頭舉出一以供養先師一令人人知有第一問戒必師師相授且道威音王從何人受戒著語云石女親開口羯磨不登壇第二問戒光從口出非青黃赤白畢竟作何色著語云本光瑞如此莫向色邊求第三問破戒比丘為甚麼不墮地獄著語云十界無安處他得大闡提大衆問在答處答在問處先師問底即是霈上座答底霈上座答底即是先師問底若向這裏直下徹去方知先師老人常住此山未曾滅度實無一時無一處無一事不為諸人提綱挈領宣説法要可謂恩大難酬也如或未然劒去久矣徒勞刻舟非住上座同徒求圓戒請上堂舉梵網經云我今盧舍那方坐蓮華臺周匝千華上復見千釋迦一華百億國一國一釋迦各坐菩提樹一時成佛道師云今日非住上座師徒與現前四衆人等簇簇上來圍著老僧法座求授心地戒開甘露門人人腳跟著地箇箇頂門放光且道與舍那華臺上千百億釋迦是同是別會得也目前包裹天共白雲曉會不得也目前包裹水和明月流會得會不得則且置只如古者道不是目前法非耳目之所到又作麼生石牛吐出三春霧靈不棲無影林能俊妙旋行振習靜衆上人求戒請上堂高沙彌不受戒知是般事便休大似蚖蛇戀窟霈上座受戒知是般事不休猶如逸鶴凌空且道受戒不受戒是阿誰分上事卓拄杖云拄杖化龍行雨去直教枯木盡開花又卓一卓大迪大馨二上人求戒請上堂金剛寶戒人人有千佛傳來事不差日日登壇親授受火中涌出白蓮花何者因戒生定因定發慧稟明於心匪從他得所以六祖大師云心地無非自性戒心地無亂自性定心地無癡自性慧若人端的明得自性戒定慧則百千法門無量妙義本自圓成不假外覔可謂塵中大丈夫也雖然如是只如僧問古德云如何是戒定慧古德答云我這裏無奴兒婢子且道古德意作麼生撒手到家人不識更無一物獻尊堂清流四衆弟子請上堂清流四衆有同心請法殷勤到碧岑石鼓一聲天地震衣珠晃耀不須尋豎拂子云大衆見麼喝一喝下座興化信官弟子林明為太夫人陳氏太蓮祝壽請上堂師拈拄杖云金剛正體卓卓巍巍真光掩映於身心智海深滋於德澤林太夫人陳氏清齋潔己念佛明心福大壽大爵高位高蓋由根深葉茂源遠流長正當今日應時慶祝一句作麼生王母蟠桃方舉出直教遍界永馨香又卓一卓下座上堂福城北關新店黃爾伯居士同知權上人數年以來以修橋鋪路作佛事今日又上鼓山飯僧請法記得昔持地菩薩於普光佛法中出家在要路津口道塗險隘處或作橋梁或負沙石平鋪道路濟度行人如是勤苦經無量佛出現於世後遇毗舍浮佛摩頂告云當平心地則世界地一切皆平持地心開即見自身微塵與造世界微塵等無差別微塵自性不相觸摩乃至刀兵亦無所觸大衆且道心地作麼生平知麼三界唯心萬法平沉一條大道非古非今珍重佛誕日隆大心聞二上人領衆請上堂舉昔日世尊於摩耶夫人右脅降誕一手指天一手指地周行七步目顧四方作大師子吼云天上天下唯吾獨尊後來雲門云我當時若見一棒打殺與狗子喫貴圖天下太平師云世尊誕生貧兒暴富雲門行棒治世干戈一往看來二俱未了霈上座到這裏又作麼生一雙孤鴈撲翼高飛兩隻鴛鴦池邊獨立更聽頌出蠢動含靈齊降誕森羅萬象盡師鳴普天匝地皆成佛九曲黃河徹底清弘範上人請上堂未入胞胎已前有一則語早已舉似大衆了也今日頭童齒豁又在這裏口喃喃地辨空華之濃淡鼓陽𦦨之波瀾成得甚麼邊事良久云日午打三更弟子李興溥修建華嚴普度道場請上堂虗空尚無二相大道豈有差殊所以三世諸佛法界衆生同一法身同一智慧同日成佛同時涅槃其來舊矣無奈隨迷著相於無生法中妄見生滅譬如翳眼見空華空實無華乃翳者妄見耳今日有歸戒弟子李興溥發廣大心修普度行以七七為期蓋欲令盡大地衆生同登華藏之門共證毗盧之果復還本有共契真常如是福德與法界等與虗空等曷可量耶雖然如是且道這一鋪功德畢竟從甚麼處起卓拄杖云盡從這裏去莫向外邊求下座九達耆德十周忌辰小師太瀛率衆弟子請上堂釋迦老子道諸法寂滅相不可以言宣但以方便力為五比丘説乃卓拄杖云只這箇生也不恁麼滅也不恁麼不生不滅也不恁麼非不生非不滅亦不恁麼向這裏洞開正眼穿過那畔又那畔翻轉身來方知道生也恁麼滅也恁麼不生不滅也恁麼非不生非不滅亦恁麼更須知恁麼中有不恁麼不恁麼中却恁麼世出世間得大自在去也雖然如是且道達公即今在甚麼處良久云常在此山中佛眼覷不見卓一卓下座上堂蓬尾乃拓浦善信之吳晉卿明卿尚卿昆仲子姪及合鄉男女老幼歸敬供養又請升座為衆開導只如這箇觀音堂古殿重開古觀音出世時時為諸人提綱説法説甚麼法不見道觀音妙智力能救世間苦如何是觀音妙智拈拄杖云大衆見麼古也如是見今也如是見卓一卓云聞麼古也如是聞今也如是聞聞見圓明未嘗欠少若向這裏見得徹信得及領荷得去則知妄苦本空妙智本有靈光獨耀萬古徽猷家家阿彌陀處處觀世音如或未然更聽一偈人人有箇古觀音相好端嚴悲願深晝夜放光無間歇箇中非古亦非今卓拄杖下座柘浦臨江寂明上座等請上堂拈拄杖卓一卓云春風暖春草香春水濶春夢長無事客思故鄉既是無事客為甚麼思故鄉不見道熟處難忘分付諸人見即便見切忌擬議思量又卓一卓下座存心上人請上堂僧問法本離言師今何説師卓拄杖進云釋迦掩室淨名杜口與師今日是同是別師云合取口好進云師為法王於法自在師云好與拄杖乃云法法無生之法心心古佛之心只須直下領荷不用低首沉吟果然到這裏説甚麼臨濟曹洞直饒釋迦老子到來結舌有分達磨遊梁無風浪起好與三十棒雖然只如老僧今日登堂又作麼生逢人且説三分話未可全拋一片心傳霔一瓊二上人請上堂師云今朝四月三日輪正當午打鼓普請看光輝遍寰宇雖然如是只如覆盆之下又作麼生會麼夜明簾外無人到靈木迢然轉緑陰十如菴主領衆請上堂若論此事三世諸佛只言自知歷代祖師瞻望莫及更説箇甚麼良久云雖然無可説傾出一栲栳謹白參玄人莫向外邊討喝一喝下座佛誕日蓮居上人請上堂釋迦老子未離兜率已降皇宮未出母胎度人已畢直下會去無邊剎境自他不隔於毫端十世古今始終不離於當念若也不會是法住法位世間相常住雖然如是且道會與不會是甚麼人分上事喝一喝延平府普通寺弘開上座興建大悲殿圓滿率放生會衆善友請上堂普通年外事達磨未西來太平好風月鼓腹樂優哉只如普通年後事作麼生拈拄杖卓一卓云觀世音菩薩來也通身是手眼遍身是手眼持弓執戟合掌搖鈴布慈雲灑甘露涌寶殿於雲中現慈容於世上直令盡大地衆生危者復安罪者還福有求皆遂無善不臻禽魚皆樂其生人物均霑其澤如是功德皆自當人一念大悲心中流出匪從外得也雖然如是且道普通年外與普通年後事是同是別會麼芍藥華開菩薩面棕櫚葉散夜叉頭卓拄杖下座啓鑰上座同弟子郁文重刊圓覺經略疏請上堂昔日釋迦老子入於神通大光明藏凡聖同源身心寂滅也是以空拶空以火燒火無佛現佛非土現土與十萬菩薩文殊普賢等一賓一主一問一答於圓覺大陀羅尼中演出無量法門亦是木人方歌石女起舞有唐圭峯宗密禪師一言之下心地開通乃為疏解如蟲禦木偶爾成文千載之下又有富沙比丘啓鑰郁文師資同會金蘭一心刊板流通與大地人指出圓覺同歸於大光明藏且道這一鋪功德與釋迦老子文殊普賢十二大士圭峯禪師是同是別會麼謾道五音該不得須知六律已全彰王應龍居士六十誕日請上堂父母未生前威音王莫窮其邊際父母已生後軒轅曆可測其高深須知已生後即是父母未生前消息未生前即是父母已生後消息祖師云要急相應唯言不二若入不二法門則可以反復陰陽延促今古與萬象同其體虗空合其德乃是當人自性常分耳只如此人畢竟是何甲子會麼剎那千萬劫文殊算不清沙邑信官樂太亨飯僧祈福請上堂人天路上福為先供佛齋僧願力堅般若種投三寶地生生福慧自綿延雖然如是只如釋迦老子道飯惡人百不如飯一善人飯善人千不如飯一持五戒者飯五戒者萬不如飯一須陀洹飯百萬須陀洹不如飯一斯陀含飯千萬斯陀含不如飯一阿那含飯一億阿那含不如飯一阿羅漢飯十億阿羅漢不如飯一辟支佛飯百億辟支佛不如飯一三世諸佛飯千億三世諸佛不如飯一無念無住無修無證之者祇如此人如何供養行者正炊香飯熟當陽奉獻不飢人真寂監院素中耆德掃塔請上堂末法風澆不可言兒孫誰肯問根源滔滔逐浪隨流去漂泊何時得到門惟我真寂師翁垂直鈎于苕溪岸畔先師和尚駕鐵船于石鼓峯頭二老人鼻孔相通呼吸相應無非拯溺援湑釣鼇連鱉先師化去三十餘載師翁遷化五十有餘載面目儼然真風不墜遺風餘韻猶足以扶衰救弊砥柱頽瀾今日素公耆德不遠千里來山拜掃先師靈塔霈上座忝為腳下兒孫如何為他發明更聽取一頌閩山浙水兩悠悠山自高兮水自流千古萬古人皆見何須特地更生愁驀拈拄杖卓一卓云師翁先師來也大衆一齊禮拜下座一端一智二上人求戒請上堂戒性如虗空受者亦如幻幻人與虗空長年自相對戒光從口出非青黃赤白若非無情漢誰能親見得正當恁麼時函蓋相稱一句作麼生搭起袈裟雲片片展開瓦鉢雪團團五篇三聚同時發明月蘆華君自看下座佛誕日必堅上人請上堂年年四月八摩耶生悉達春至百華開雨過千峯碧記得昔日曹山問強上座曰佛真法身猶若虗空應物現形如水中月作麼生説箇應的道理強云如驢井山云道則太殺道只道得八成強云和尚又作麼生山云如井驢鼓山道井驢驢井爭似月當空千江俱現影拈拄杖卓一卓云今日悉達太子在諸人眼裏耳裏鼻裏舌裏乃至八萬四千毛孔裏全身出現放大光明指天指地大師子吼云天上天下唯吾獨尊諸人還見麼若也見得釋迦老子即是諸人自己諸人自己即是釋迦老子同時出世同日成佛一切智智清淨無二無二分無別無斷故如或不然塞壑填溝人不見從教面上貼黃金又卓一卓下座上堂太封君韓公泰然居士年高七十有二長齋四十餘年日誦金剛般若以發明心地今日入山設供請老僧升座舉揚佛意普施大衆結箇般若因緣知麼人人自己有金剛今古宣流未暫忘非字非文非義理遍空遍界不曾藏所以釋迦老子盡力道破曰所有一切衆生之類若卵生若胎生若溼生若化生若有色若無色若有想若無想若非有想非無想我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者唐朝大珠和尚釋曰九類衆生一心具足隨造隨成無明為卵生煩惱包裹為胎生愛水浸潤為溼生倐起煩惱為化生悟即是佛迷號衆生菩薩只以念念心為衆生若了得念念心體空是名度衆生也智者於本際上度於未形未形既空即知實無衆生得滅度者大衆世尊恁麼説大珠和尚恁麼注今日老僧恁麼舉揚為是自己金剛非自己金剛會麼知音不在頻頻舉智者須知暗點頭卓拄杖下座邵武王紹熙居士飯僧請上堂僧問聖凡路絶無階級頓悟玄開不二門不二門中是誰出入師云闍黎即今在甚麼處著腳進云本地風光超萬有箇中獨露妙玄機師云猶是門外漢師乃云實際理地不立一塵萬行門中不捨一法今日王紹熙居士炊無米飯盛沒底鉢奉三世慈尊供六和清衆檀波羅蜜一念圓明不二法門全身直入如是功德不以世求雖然如是且道那一人如何供養木童時獻團圞果石女長持菡萏華中元修建普度福首弟子葛賜錦郭秉文郭肇元等請上堂師云一衆同心修普度三年告滿喜功成但願四恩并三有共乘法力悟無生且道無生作麼生悟大衆會麼年年七月十五諸佛悉皆歡喜僧衆各各自恣識得飯原是米識得後如何天上人間堪應供喝一喝云喫和羅飯底不是你孫葵五居士六十初度飯僧請上堂師云靈源不竭今古常然在人同人在天同天拈拄杖云且道在老僧拄杖頭上又作麼生卓一卓云今日無量壽如來在這裏為諸人轉大法輪向道無量百千萬億壽只在如今一剎那一剎那中無量壽一切剎那亦復然以如是壽普為大地衆生一時授記如天普蓋似地普擎了無遺漏只如今日葵吾老居士飯僧請法應時納祐一句如何道薰風已來至喬木正繁森卓拄杖下座定默菴主度徒子出家受戒請上堂師云夫出家者躍出三從之質預參三寶之尊著福田衣剃煩惱髮親霑戒品逈脫塵勞修梵行於世世生生度含靈於在在處處期登聖果畢證菩提雖然如是只如金剛地上卓然獨立一句作麼生從教五濁深無底難染心池出水蓮東照上人請上堂師云東照殷勤請法來皎然心鏡正當臺十界聖凡齊現影箇中元不著纖埃只如今日四衆圍繞法座眼睜睜地耳歷歷地意了了地聽老僧説黃道白且道是影不是影會麼森羅萬象非他物本有光明遍九垓慈門上人六十初度請上堂師云未入胞胎已前虗空包不住既出胞胎之後芥子納有餘芥子納有餘的虗空包不住虗空包不住的芥子納有餘向這裏見得徹擔荷得去無邊剎境自他不隔於毫端十世古今始終不離於當念如或不然為山登九仞捻土定千鈞延平普通寺弟子牧菴密勤不器同衆求戒請上堂師云本源自性清淨戒只在當人一念中無量劫來常不壞猶如赫日照虗空大衆須知此戒性雖本有從師顯發所以登堂羯磨教授威儀步步在金剛道場事事是舍那心地以此自利而究竟菩提以此利生而平等普度故云衆生受佛戒即入諸佛位位同大覺已真是諸佛子諸人還自信麼還自肯麼我不敢輕於汝等汝等皆當作佛下座佛誕日溫陵黃孔固孝廉為太夫人劉氏本慈請上堂師云人人父是飯王父人人母是摩耶母但看年年四月八處處香湯浴太子獻一供而諸佛齊臨飯一僧而千聖普集不是神通妙用亦非法爾如然乃當人本有性功德耳今日黃孔固孝廉奉太夫人劉氏請法秉戒因齋慶讚一句如何道母子同心修福慧箕裘百世永馨香珍重立新監寺德統德耘德寧梵止曇印自光宗廓汝洪心湛圓印超倫自信默通達光不染德輝惟輔濟汪了然四弘等二十位輪值寺事上堂栴檀林裏無雜樹密深沉師子住狐狼野干盡潛蹤一段真風遍天地如何是一段真風豈不見祖師道心法無形貫滿十方在眼曰見在耳曰聞在鼻嗅香在舌談論在手執捉在足運奔遍現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂諸仁者若端的識得佛性則綱維叢林荷負大衆建立三寶弘通大乘一一自般若中流出若不識佛性則事事皆識情運為用識情則識情共聚行般若則般若同居栴檀叢林栴檀圍繞荊棘叢林荊棘圍繞定不誣耳鼓山自博山老人先師和尚開創以來六十有餘載真風不墜古道猶存唯願諸仁箇箇開特達之懷奮超羣之志明本有之性興無作之功繼先德之芳蹤為後學之良導接引四來同歸覺地是所厚望耳正當恁麼時同聲相應同氣相求一句如何道更聽一頌人人佛性本來同六用圓明空不空一念回機全體現驀召大衆衆皆舉首乃云性天慧月正當中珍重恆正上座六十初度請上堂師云恆正老比丘行年已六十歲月疾如流滔滔去不息惟無位真人尊貴無倫匹身是金剛身如如不變異歲月本不遷壽量有何極晝夜放光明今古恆赫奕且道無位真人即今在甚麼處豎拂子云大衆見麼喝一喝下座優婆夷弟子許太華預修功德請上堂僧問夾山道猿抱子歸青嶂後鳥銜華落碧巖前意旨如何師云只在目前進云只如法眼道三十年祇作境會又作麼生師云心會亦不得僧禮拜師乃云衆生諸佛本來同萬象森羅一鏡中心地福從心地起生生福果自彌隆豎拂子召大衆云是甚麼良久云五眸不見萬古自虗明擊案下座優婆夷弟子鄭太坤預修功德請上堂師云佛祖正宗人天眼目不從別處得來親自箇中流出箇中事作麼生拈拄杖云只者箇喚作拄杖鹽梅觸太羮不喚作拄杖棄波而尋水畢竟如何連卓三下云古今常不壞世世作津梁又卓一卓下座
