front:
  text: 刻支那鼓山為霖禪師還山録序壽山禪師見住薩州玉龍山千指圍繞清規肅整儼如古叢林頃因有故於大府路經京師出所齎之支那鼓山為霖禪師還山録付鍥人版行於京師而為霖禪師先年所賜於卑僧獨語序與偈阻乎國制但得其聲而未得其實者皆載在於録中豫尊壽山禪師於嚴程倉卒之間不忘法門且喜拜鼓山之賜於還山録中偵其歸錫之途程而得得出山訪旅館於攝津賀還山録刊成而謝由是得鼓山之賜話間漸察其道貌倣佛似識問其舊字則四十年前之親友而相見相失故吾於髮白面皺也相與道舊相歡如昔年禪師見囑發揮還山録印行因由冠於卷豫於是戲之曰今日支那日本稱禪師開語録者如稻麻竹葦抑物以寡貴以多賤耶今世諸師之語録有益於人間者不過用覆醬瓿而已師刻此録未審有説也否禪師正色應豫曰鼓山大師言不羡乎行行無不充乎言所以內之則震旦國外之則日本琉球未曾有間然乎大師之言行則初祖所謂明佛心宗行解相應名之曰祖者今日非鼓山大師而誰歟然則其一言半句霧海之南針也夜途之北斗也公混時輩而議之則豈非失一隻眼哉豫於是俄起合掌而曰前言戲耳師稱鼓山大師而無欠無餘今揭師之言於卷首為序而足矣時元祿癸酉十月二日宗門一瘞獨菴叟玄光謹題還山録序宗門別傳之道貴在得人以傳不傳何以繼往而開來然傳之之要自古為難先德云千人萬人中覔一箇半箇堪為種草豈易易哉以今日觀之此一大事尤賴師家擇法精嚴智願廣大驗其當機的是出世福慧男子皮肉骨髓與從上諸聖一脈貫通可以赤身擔荷方始授以心印俾其提佛祖綱宗開人天眼目互相傳庶無疑誤其於法運凋零之秋豈特小補亦識法者懼耳吾師霖公和尚親承先老祖永公記莂秉空王令遊五濁海布慈雲而灑甘露三十年所矣迹其接物利生之心如慈母之姁嫗嬰兒而大法傳授之際則牢把鐵關不少假借曩見法門之弊頽波日下勢莫可挽乃以法席委之靜公而飄然遠引徜徉富沙山中經歷一十四載將終身焉逮靜公謝事山中耆舊以洎會城薦紳殷勤敦請動數十次至有長跪痛哭願畢命以勸駕者師不獲已念先師法道所寄乃舍己從人幡然而起矣師之還山也萬指奔赴歡聲如雷門前剎竿煥然重振凡登堂入室以及小參示衆一言一句洞徹源委一劄一錐深入閫奧其為人之念逾殷求人之意逾切而得人之效逾難有風穴流涕之心而仰山再來以續此一線之脈不知其為誰也茲弟子法剛請師還山録付梓流通師欣然諾之乃謂錫瑗曰從上五宗諸祖雖嗣續久乏而道在法門如日月經天古今不昧凡屬有眼孰不共見余忝主法壇有年雖未遇機緣而斯言未泯吾道在茲後世必有觸目會心者何必耳提面命然後為己所出耶嗚呼師之見逾真而心逾苦矣昔博山無異和尚嘗有言曰宗門中事貴在心髓相符不在門庭相紹苟得其人見知聞知先後一揆絶未嘗絶若不得人乳添水而味薄烏三寫而成馬存豈真存吾意寧不得人勿授非器不得人者嗣雖絶而道真自無傷於大法授非器者嗣雖存而道偽反自破其先宗故博山當時道滿天下竟未嘗輕可一人永老人平生縝密嚴重至年八十始以正宗付囑於師有一髮欲存千聖脈此心能有幾人知之語其所期如此宜乎知之者希今師年七十有四亦珍重慎擇不聞輕有付授余觀三師護法之心不謀而合有若符節政古德所云非遇上根宜慎辭哉又云宗門爪牙遇箇中人才拈出若投機則共用不則便剗却蓋防末流之濫觴塹法門之嚴城衛羣靈之慧命豈非大有造於人心法道哉辱命一言序諸首簡管窺蠡測敬述師之智願如此會當有賞音者耳是為序康熙戊辰孟春歸戒弟子溫陵太航龔錫瑗拜撰鼓山為霖禪師還山録目次卷第一序文上堂卷第二示衆卷第三佛事偈贊卷第四序題跋記旅泊幻迹鼓山為霖禪師還山録目次
