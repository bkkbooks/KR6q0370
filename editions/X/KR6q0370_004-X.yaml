body:
  text: 侍者性朗錄雜著序重刻金剛經感應記序般若功德如虗空不可思議者以其能照破諸相洞見性源也何者眾生以無般若慧眼處處貪著永沉生死苦海諸佛菩薩以有般若慧眼處處解脫直達涅槃彼岸經云一切諸佛及諸佛阿耨菩提皆從此經出葢此經是破有之先鋒出暗之明炬諸佛之母萬法之宗若能如是知見信解不生法相則其所得功德與虗空等與法性等豈一日三時恒沙身命布施能較量其一偈之功哉是經自秦傳譯以來受持者甚盛而感應亦非一六朝唐宋以至元明所集感應傳記事蹟昭著播人耳目善友黃君建五每以此經為照心之明鏡受持有年覩茲感應倍增踊躍乃發願梓行轉化未信非悲智深心何以臻此然而其中多是入冥免罪還魂與現世禦災捍患之事若夫因經開悟明見自性者殊不概見苟持經而希此功德是棄金而擔麻得珠而易櫝豈不大可惜哉惟劉屠聞僧唱應無所住而生其心放下屠刀合掌立化庶幾可耳故特發其經旨于前使知般若功德不可思議者葢在此而不在彼種種靈應乃其緒餘也持經行人幸三致意焉刻大慧禪師書問序昭覺門下得法者眾獨著臨濟正宗記付大慧禪師者以其能徹法源底又能赤身擔荷從上佛祖慧命不少假借故當分座之日即炷香為誓曰寧以此身代眾生受地獄苦終不以佛法當人情乃以一竹篦子一狗子無佛性話普接羣機天下翕然歸重法席之盛得人之多號為臨濟再出正宗之付豈徒然哉然師所得既琦瑋發用亦廣大通身是口莫可攔當故紫巖張公謂師說法縱橫踔厲無所疑于心大肆其說如蘇張之雄辨孫吳之用兵如建瓴水轉圜石于千仞之阪諸老斂袵莫敢當其鋒可謂善取諸譬也平生又雅喜接士大夫每入毫端三昧動輙數百千言滔滔汩汩有一瀉千里之勢其發藥處能中人之膏肓攻人之痼疾必使其霍然病起而後已自有宗門以來具大眼目大辯才善說法要者師一人而已其書問溫陵業有刻本但及其半不無遺珠之恨副寺弘忠乃于師錄中抄其全本募眾刊板以廣流通不唯使近世士大夫信嚮此道者有所龜鑒亦使衲子有大志擔荷法門者知從上尊宿為人抽釘拔楔之際有如是手眼如是真切如是廣博如是體裁皆由自性宗通胸襟流出信筆信口了無凝滯視世之握麈尾據猊座高揮大抹效邯鄲之步者奚啻天淵之隔耶剞工既竣敬為敘諸簡首以志所慕云重刻龍舒居士淨土文序竊惟眾生以愛故墮落娑婆如石下井無由可出諸佛菩薩居寂光實報土中心地法眼悉皆洞見乃乘悲願隨類現身多方援拔或為國王大臣沙門居士以及姦偷屠販但有可化之機無不現身攝受今觀龍舒居士王公虗中豈非其人者乎居士少業儒為國學進士博學能文甞解六經語孟老莊不蹈襲前人一字中年恍然自悟曰皆綺語也乃棄去專奉淨土之教禮誦不輟發願往生臨終見佛來迎屹然立化其存日本諸經論著淨土文十卷諭世無理不明無人不勸其言悲哀懇切聞者興起有念佛而鬼祟却走者有念佛而眠夢得安者是驗之于生前者也其翻板而舍利迸出示夢而沉疴頓起是驗之于身後者也至誠感通一至于是謂居士非佛菩薩乘願而來攝受眾生歸於淨土能若是乎昔空隱老人甞以此文刊板于東廣勸念佛參戎范公法諱今已奉老人之教有年捧檄鎮閩乃率蓮社諸上善人復翻板于閩中以廣法施功竣命余一言冠諸篇首夫淨土法門金口諄諄見諸大乘經論如日月之揭中天凡有眼者孰不見之且古今依之修持往生極樂者不一而足況龍舒現居士身修沙門行臨終立化靈驗昭彰其言不信孰可信乎稱揚淨土本屬宿懷逢茲勝緣倍增踊躍忘其固陋樂為疾書玄錫禪師語錄序昔世尊靈山會上諸王子出家如阿難陀孫陀羅難陀等皆現證阿羅漢果無空過者葢當其裂破富貴樊籠即是得道捷徑況悉心併力克苦磨礪而不獲證者乎佛法入中國王子出家唯龍湖聞禪師為唐僖宗太子得法石霜隱居邵武龍湖山以嘗救龍龍穴巖下為泉以報師德故山號龍湖焉聞臨入滅說偈曰我逃世難來出家宗師指示箇歇處住山聚眾三十年尋常不欲輕分付今日分明說似君我斂目時齊聽取于是閉目安坐寂然化去其風致可想見也聞之後史傳殊不多見至明天啟初有玄錫禪師乃瑞昌鎮國第四子眉目清真如畵幼不染塵矢志出家年弱冠將畢姻師自惟曰若爾則吾著枷鎖矣何時得解脫乎乃潛入博山投無異老人剃落師事雪關和尚著弊垢衣修頭陀行鎮國百計陶寫莫能轉其志繼而掩關不語密自履踐乃恍然契悟道聲藹著及雪關示寂師繼席為眾開演毗尼提唱宗教諸方聞風皆爭迎致久之乃移住松溪華嚴寺終焉遂塔于此又二十餘年其徒子傳忍乃持師平日示眾語請余序而行之余究觀其見地圓明履踐嚴密吐語不落格量示人惟務真修葢從博瀛爐鞴中來非學語者所能企及雖未敢與二難陀輩齊驅竝駕而龍湖之後有師法門亦不寂寥耳嗚呼博山平生未肯輕可一人末後諸方每崛起一二往往光前耀後此語若遇知音方知浴龍一派不竭重鋟牛戒彚鈔序夫人生天地間所以靈於萬物者以其有不忍之心雖一蚊一蟻咸欲救護不敢戕害況牛之大物命乎世之貪饕者嚼盤中之肉津津有味不思食者甚美死者甚苦試一反思恐不能下咽矣姑無論因果酬償之報但觀其就死之頃旃陀羅奮槌怒擊牛方眩暈而皮已生剝委地矣鮮血淋漓身首分張痛莫能忍而猶瞪目視人淚盈盈然下不過冀人動一念惻隱之心憐其苦耳不念其苦而反以為樂恣意食噉不忍之心安在此心若昧則其人去虎豹豺狼者幾希玄天上帝戒食牛箴云牛之形上列天星下興地利有功於世無害於民殺之者國有刑法食之者幽有禍愆牢字從牛獄字從犬不食牛犬牢獄永免此語廣佈人間乃尋常耳目所共見聞者彼輩如聾如瞽恬不加悟其愚智為何如也昔世祖章皇帝萬機之暇乃採集古今諸賢戒食牛要語彚為一編曰牛戒彚鈔又御製序冠於編首刊佈勸世因思佛心天子恩及異類如此況率土之生民者乎兵馬司周公諱士瑢休官林下日與諸禪伯締方外交留心此道而尤刻意於戒殺放生自行勸人僕僕不懈乃以彚鈔謀諸同志鋟梓以行上體聖天子胞與之意下與斯民全不忍之心挽回殺運同臻熈皡之天默轉殺機共躋仁壽之域是其志願也辱命敘後敢一颺言必有同仁共相勸戒耳是為序獨菴獨語序少林之道六傳至曹溪二支五派龍象傑出凡入其彀者人人以向上自奮一言半句足以點鐵成金豈假多法所以極一時宗風之盛至宋季以來道與時寢衰法隨機漸下唯賴一二先德不惜苦口扶衰救弊或拈經論骨髓或揭祖宗淵源或指瑕擿玼令知悔悟或因病施藥痛下鍼錐庶幾啟迷關於智鑰迴狂瀾於既倒如甘露滅之林間錄杲大慧之宗門武庫以及中峯之東語西話雲棲之竹牕隨筆鼓山之寱言等皆以慈悲之故乃有逆耳之言也至於近代法門流弊尤有不可勝言者即欲言無從啟齒有心者不過閉門塞兌唯將一嘿仰答佛心而已奈之何哉適有日本玄光禪師乃新豐嫡裔以所著獨菴獨語一編附商舶見寄且請正焉余啟卷諷讀反覆再四見其宗眼圓明教海淹博其識正其論確其節操嚴其眼目大其心即古德之心其志亦古德之志因時救弊護持正法葢欲存佛祖一綫之脉於末世俾智者具擇法眼知邪識正揀魔辨異不至盡驅入於魔羅陷穽其荷法之功豈淺尠哉語云禮失而求之野今日支那宗門掃地不意于日國玄光禪師見之詎非法門一大幸哉夫名標以獨菴獨語者葢盡法界唯此一菴菴外無菴盡大地唯此一語語外無語學者能即是而求之則知盡恒沙國土亦當如是流通發揚不特日國而已矣敬為序諸卷首以告諸來者云鼓山常住交頭簿序常住之有交頭簿以備稽攷便交代也順治丁酉冬先師示寂明年春余忝承遺烈繼守山門從上庫司立交頭簿一扇每至歲暮凡常住所有錢穀布帛豆麥油鹽之類一一書上豐儉隨緣新舊監寺相交代即不交每年亦須書明庶無遺漏前簿乃余己亥年繼先師而立已經二十有七載填寫已滿副寺自光乃請更立新簿以今康熙乙丑年為始至歲畢凡所有照舊例書之繩繩相繼毋墜前修葢余甞有願此山代出真善知識真比丘僧十方聚會以法共住傳化將來報佛恩德庶不負先德建立叢林之意惟冀後代住持及知事大眾深體余心人人明因果慎罪福護叢林如護眼目敬大眾如敬父母外弘無諍之慈風內究自心之靈玅視利養如箭入心視眷屬如鳥集樹修遠離行植福慧因始是真比丘也其或任愚性以逞剛強恣憎愛以凌大眾貪求愚癡眷屬錯亂佛因因果不避譏嫌無所忌憚如此則僧護經中火度鐵鎚肉瓶肉甕等地獄之苦此輩有分不特迦葉佛時比丘也法誡凜然豈可怠玩願諸執事大眾共相警悟努力行持則山門幸甚法門幸甚是為序壽風和尚序石玄上座昔嘗為先師老人湯藥侍者朝夕勤劬周視無間眾皆讚美既而歸受業未幾沾痿痺之疾手足拘攣坐臥一榻之上凡來者以病說法聞者莫不傾心創臥雲菴居之已二十餘載矣今歲在乙丑復月念有八日屬上座花甲初度會下歸依弟子皆欲得余一言為其師祝余惟上座因病得力早已洞見是身地水火風四大假合了無身心之相有何壽之可言然所謂祝者為祝地大耶地屬四肢百骸髮毛爪齒心肝脾肺念念趣盡有何可祝為祝水大耶水屬津液痰唾膿血便利刻刻流注有何可祝火大風大亦復如是子細推尋求其壽者之相了不可得又從何而祝乎雖然四大之身三緣和合而現其相如水中月鏡中影了無真實然而鏡影不離本質水月豈離本月將見赤肉團上金剛正體覿露堂堂先天地不生後天地不老起威音之先至樓至之後亘古常然無成無壞苟欲以世相求之如覔兔角於石女頭上栽龜毛於虗空眉邊匪徒無益反資疲勞無有是處石上座深明此旨乃即書此以為壽知必有迺然一笑共相忘於言外耳是為序四無穎公七十壽序夫箕疇五福壽居其首者福之本也苟其本弗立則餘之四福誰為享受乎故壽居首也我輩沙門釋子居山林巖谷之間他無所事惟道是謀遠塵離黨鉢食納衣美其菜根樂其幽寂壽雖若可緩然非壽亦無以竟其道業由是觀之壽為世間福德之本亦出世間道德之本也可弗重歟高葢山定光寺四無穎公幼師支提印中老宿為弟子經業既習禮念惟勤始稟具於雪關和尚後圓大戒於先師永老人座下跪誦華嚴密持佛號一願一行回向淨土葢四十年如一日矣茲丁卯孟冬十有七日適公古稀初度而諸山法眷及諸弟子相與謀所以祝公者乃以壽言見屬余知公三十餘年所矣喜公之年高德重淨業有成他日蓮池會上必是同見同行之道侶故不辭荒陋乃舉壽為出世致道之本以似之匪徒區區效世俗岡陵九如之頌而已公其勉旃是為序惟靜禪師遺語序竊觀法門凋弊莫甚斯時求其痛念生死真參實究本分衲僧指不多屈況乎一超直入越格道流者乎法運下衰從可知矣雖然佛性之在人心不容磨滅山間林下必有傑然獨出者余於惟靜明一二公見之順治初余與二公同居先師座下每入室先師多方提激示以本分鉗鎚各有契證且同堂聲氣投合志趣無間有年矣後靜公以眼疾請假去隱居於建之大百丈山凡九載松食荷衣無意人世將終身焉及先師沒余忝守山門乃居一公於寺後之調象菴凡五年深自磨礪浩然大徹每相與盤錯無不臻奧一日與客茶話罷乃書偈翛然坐脫眾皆愕然余以鼓山門下了事衲僧稱之葢實錄也甲辰冬余以事至上游乃逼靜公出百丈同舟而下居公於吸江蘭若復八年適余謝事出山乃舉公繼席而嗣戒於先師正當甲寅之變公鎮之以靜而海眾安堵四方歸嚮法化洋洋叢林鼎盛經十載矣忽倦於接納仍退居於吸江又三年余還山而與公時相切磋法喜之樂如當年同堂無異至戊辰四月朔公以疾遷化時年已七十有二矣當在恙室中空諸所有唯置一床寂然而臥若入定然雖問疾者盈門而酬應不失其恬惔如此因思明公性剛毅而得之於剛毅公性沉潛而得之於沉潛事事皆爾死生以之毫髮不爽也余三人者雖出處死生前後不同要之皆先師門下本分衲僧於時輩中求之豈多得哉弟子如壽久侍巾瓶以公平日示眾遺語類集成書請余敘而行之究觀其拈提向上及為新學開示戒法婆心苦口諄諄不置皆真實語而正知正見乃自先師爐鞴中煅煉來其所得自受用三昧不淺而推其土苴以及人有餘裕矣嗚呼祖風凌夷當斯世而有斯人如披沙見金詎可復得耶每一臨文不勝三歎題䟦雲棲壽昌博山鼓山諸祖同㡧題辭這隊老古錐無端撞出五濁惡世藏身露影聚頭作喧不知圖箇什麼只為釋迦老子一點真血脉不肯拋撒珍重流通亦為一類苦惱眾生從冥入冥作箇引路底火把子耳霈上座傍觀頗親一一說破不是家醜外揚只要大家知有石几南向竝坐若口喃喃地商略禪淨是同是別者為雲棲蓮池師太壽昌無明老祖兩傍圍繞皆其派下法胤侍坐拱聽其左執如意凭几而坐者為博山無異和尚右端然袖手而坐者為先師永覺老人博山之傍肅然無言者為雪關誾禪師先師之右手握麈尾熈然微笑者乃余陋質雪關之下倚石仰首者為一脉監寺受業師智光上座曾親炙博山鼓山而來附陪坐于此以寄所思耳其遠處二人度橋而來者前為純一監寺後執杖欹首翹望者為一脉監寺葢荷負大眾奔走道途而不休者也童子凡六人或荷擔或侍立巖巒稠密樹木繁蔭一一皆有生氣不可計算噫諸祖往矣余獨後死無以為流通發揚葢所可得而傳者影不可得而傳者非影苟有因其可傳而得其不可傳則所謂靈山一會儼然未散者豈虗語哉其或留連於丹青之上描邈於形似之間則劒去久矣方乃刻舟余又不能無重嘅云䟦李長者十明論華嚴第六現前地菩薩寄位緣覺以十門逆順觀察十二因緣成般若門三空自在智慧現前棗栢長者既釋之於論又重以十義明其大旨謂之十明論其意葢謂十二緣生是一切眾生逐妄迷真隨生死流轉波浪不息之大苦海亦是一切諸佛寶莊嚴大城亦是文殊普賢常遊止之華林園苑恒對現色身在一切眾生前教化無有休息以迷十二有支名一切眾生悟十二有支即是佛故眾生及以有支皆無自性隨煩惱無明行識名色六根相對生觸受愛取有成五蘊身即有生老死常流轉故若以戒定慧觀照方便力照自身心體相皆自性空無內外有即眾生心全佛智海又以空慧長養大慈大悲入生死海教化眾生如蓮華處水而無染污若厭十二緣生別求解脫如捨冰而求水逐陽𦦨以求漿若以止觀力照之心境總亡智日自然明白如貧女宅中寶藏不作而自明窮子衣中珠無功而自現此乃華嚴圓頓大旨李長者特拈出指示於人最為肯切恩大難酬壁九禪人捐貲翻板用廣流通其亦有得於此知恩報恩者歟䟦摹刻釋迦如來成道記往讀王子安童子時所著滕王閣序天機特發才學兼富雖一時對客揮毫實為千古絕唱即博學弘詞之老儒不能過也後又讀其所撰釋迦如來成道記雖原本於釋迦譜而以四六貫之句句出以己意即深入佛法閫奧之老禪亦豈能過乎可見般若因地有自來矣真不思議人也今觀董太史所書此記乃奉紫栢老人命歷二紀而後成允稱法門至寶使讀者玩其墨蹟而了其文旨洞見如來一期降生利物之蹟植菩提種作成佛因其有益於世尤不可思議三山林子吉人博學好古家藏此帖出以相示深歎希有乃覔良工摹刻以廣其傳是亦林子之心也歟題高斯億所臨御馬賦高子斯億攻文之餘游戲翰墨書畵之名著於弱冠今年三十有六偶病起試筆所作行草諸卷寄以相示余與濟汪禪人展玩彌日不忍釋手深歎其天資筆力逈出尋常不可企及也其所臨御馬賦一帖精光射人尤為奇絕不唯體勢點畫發筆結搆無一不肖似而能得其全神即使鹿門復起不知其為己出為他摹恐不能辨也精義入神一至於是會當刻石以傳與蘇黃米蔡諸公齊驅竝駕於天壤間孰謂古今不相及哉高子諱士年閩侯官人尊翁固齋先生長子嵩俱知名當時云記悲思堂記芝城踞八閩上游山丹水碧俗厚民淳先儒生於其中多習詩書禮義又雅信佛法知因果罪福之說以及忠孝節烈史冊炳烺自漢武版籍以來千有餘載雖古今治亂不一城闉無虞五代間王延政僭號建州南唐命查文徽統兵攻之以邊鎬王建封二人為將謀屠城章太傅仔鈞夫人練氏全之宋紹興間范汝為竊據延建邵三郡凡七年大將軍韓世忠攻克丞相李公綱保之存之祀典千載如生今皇清定鼎於順治三年丙戌八月大兵開閩四民向化鷄犬不驚郡邑城市安堵如故明年丁亥七月四日突有王祁不知何省人潛居閩中謀不軌脅鄖西王起自古田擁叛民數千奪城據之縱偽殺掠各邑騷動兵巡道顧某挈家奔福州知府高某死之官兵陣亡者眾縉紳士民禁不容出備受荼毒民莫控訴凡八閱月江浙兵數攻不下明年戊子二月朝旨命五部堂統大兵十餘萬八門圍攻郊外團掘深坑飛鳶莫度一無脫漏者眾炮震地箭落如雨凡四十餘日未甞暫息其中傷死者不可勝紀當是時也無所謂練夫人李丞相其人者起而救之籠雞釜魚坐待其斃可不哀哉至四月初四日城陷四面火發兵士蜂起充塞城中競相屠戮男女老幼身碎鋒鏑之間骨穿矢鏃之內其中有比鄰約縱火而舉家自焚者有挈妻擕子同赴池井者有率親屬閉門自經者有稚子少婦生離死別掠之而去者更有義士烈女守死不回甘蹈白刃水火而不辭者烈𦦨亘天七日夜不息玉石焚盡靡有孑遺屍積如山血流成河無論民𭁵良賤父母弟兄宗族姻親朋友知識殺業所感同熟一報之中夢境相追妄受莫忍之苦福者已超善趣罪者還繫冥扄歲月綿邈出苦何期嗚呼痛哉生靈無數盡作刀下之人惻隱有心誰憐罔依之鬼冥魂杳杳滯魄悠悠莫覩光明之天豈達歸真之路惟我觀世音大士具同體悲興無緣慈千手提擕千眼照見不擇冤親平等普度由是敬斂眾財選白雲曠地架造堂宇額曰悲思中奉千手眼觀世音菩薩及地藏目連聖像左右龕室供列合城與難官吏將卒紳衿子民僧道善良以及農賈工伎眾等神位晝香夕燈經聲佛號春秋奠享中元薦庶承三寶恩光永出九幽極苦况孝子賢孫念祖父之罹難仁人長者哀冤魄之沉淪大作津梁恩資存歿同躋仁壽之域共登解脫之場福被全城功流永世是余卑願也抑聞弔古戰場云誰無父母提擕捧負畏其不壽誰無兄弟如足如手誰無夫婦如賓如友生也何恩殺之何咎戊子芝城謂今之戰場非耶舉城父母兄弟夫婦皆無罪而就死所謂天地為愁草木凄悲弔祭不至精魄何依余每思及未嘗不涕泣沾襟轉盻間四十年知者不言言者不審釋今不記後將無聞而諸靈永無出苦之日矣故以悲思名堂而復略述其顛末貞之於石以告諸來者為記柘浦覺林院警公泉記泉以警公名者志德也葢道以人弘理以事驗非浪階也昔警公首闢茲山也眾多水乏汲負維艱一日經行寺右旱田間乃以杖卓之泉沸沸然隨杖涌出愈卓愈涌遂命工鑿井以畜泉深廣丈許其色如乳其甘如飴盈盈然流溢於外乃以竹筧引歸雲厨供眾數百冬夏不竭公真不思議人也公化去已念餘載康熈甲子仲春余禮塔至山覩茲嘉瑞歎為希有遂命名警公泉乃刻石記之俾後之居此者飲水知源不昧所自云爾靈石重修三塔記靈石為玉融古剎唐俱胝和尚開山禪祖相繼凡五十餘代入明以來三百餘載祖燈久熄佛火黯如鞠不為荒煙蔓草者幾希矣其重興始於萬曆間同我老人繼於上首曹源禪師源師既化弟子寂影等皆能仰體師心內勤禪戒外嚴道場歷有年載備經艱危至誠感格四眾歸心興建大殿法堂天王殿兩長廊鐘鼓二樓佛像藏經以及山林田土等咸備焉雖不能一一復古然已得十之七八矣僧眾數百指晨鐘夕梵精修不懈千年祖庭煥然一新詎非法門盛事哉但從上諸祖及海眾靈塔尚委荒草不遑修葺監寺寂陟乃謀諸法眷各捐所有共襄勝蹟塔在本寺龍砂之外坐坤向艮依堪輿家言仍其原位移升上坪丈許庶接脉承氣又倣諸方三塔成式中奉歷代諸祖始開山和尚繼而冰禪師五色舍利一瓶計三十餘粒以及心宗禪師海印禪師正覺禪師漸禪師啟譸禪師即菴禪師鐵壁禪師雪巖禪師等塔散在諸處者俱斂藏於此額曰金剛幢左安尊宿耆德右藏勤舊經始於康熈乙丑復月十有六日告竣於明年二月望日影上座走書乞余言刻石以昭後世余惟堪忍界中有為之法剎那變易成壞何常得人則興不得人則廢果使三寶真燈不燼則此塔片石可存惟望後賢志願不衰繩繩相繼毋墜前緒云耳是為記重安舍利入塔記鼓山舍利原委具於前記已刻石殿中茲不復贅更有美石四十餘顆係古石匣中護舍利瓶者先是順治庚子三月十四日奉舍利凡七十八粒貯以晶瓶藏於正法藏殿石塔中其石子仍藏方丈舊瓶內至康熈丁卯閱二十有八載因塔中晶瓶傾仆卜二月十九日啟塔重修請出舍利具香湯沐浴是日取前石子觀之盡變為舍利又生小舍利纍纍然如芥粟黍麥共計二百餘粒五色圓潤精光射人因歎如來法身徧滿法界隨處出現不可思議有緣眾生無不得見也乃作小金盂藏之金盂藏於銀盂銀盂封小磁瓶內又卜三月六日同晶瓶舍利安奉入塔一隱一顯如八日月圓融無礙也惟願護塔善神守護此塔不經諸患常住此山為人天福田佛願無盡我願無盡住山道霈記鼓山諸祖道影記甞觀佛祖眾生親從法身現起都是箇影子而丹青者又於影上現影雖展轉虗寂要之真本無影而影不離真總以法身為定量惟在智者能深自觀耳崇禎癸酉春先師永覺老人奉聞谷師太命作諸祖道影傳贊凡一百三十尊業已刊佈叢林久矣至大清康熈元年壬寅冬余開法泉之開元得此新繪祖影八十餘尊如獲至寶乃重價購歸裝潢既就供奉於正法藏殿但其中具缺不一前後參差竊欲稍補禪門五宗與西天東土應化聖賢以及天台賢首慈恩蓮宗律宗諸祖各數尊庶有端緒以便瞻仰是時坐有土木之役不暇及此乃濡滯至戊辰夏凡二十有七載始得倩寫生於先師諸祖道影內略補入凡四十七尊共一百二十有七尊裝成三卷同帙乃以先師原贊焚香拜書於每尊之前其中有數尊乃先師所未登者余僭補其贊詞時余年已七十有四矣因思烏免遄邁不少暫駐幸天假我年究竟此一大事豈非夙有般若微緣故於末法凋零之秋圓滿此勝功德耶嗚呼諸祖既往而儀表如生智者若能因其影而見其形見其形而見其心則諸祖不先我等不後即是親依座下親聆謦欬親領棒喝豈古今時處所能間隔耶其或但愒玩於影像卜度於字句則是棄金擔麻者流安貴有此因特詳其顛末俾後之觀者知其所自亦知所以觀之之意云耳此祖像一部三冊乃與馬法秀東王公之子希聖希賢希尹所施宣德間烏斯藏比丘海崙金畫華嚴善財童子五十三參圖贊一部同供於藏殿大藏經橱內永為鼓山常住時戊辰七月自恣後三日住山某謹記重修古普同塔記昔百丈大智禪師肇建叢林十方聚會以法共住同堂而食同床而坐互相砥礪期於智證至於報緣既盡則負薪茶毗拾其燼餘同歸於塔葢表以法為親死生不忘之義自有唐以來天下叢林咸取則焉謂之普同塔鼓山普同塔在鉢盂峯之下面雙江而遶萬岫極稱形勝且砂水回環基搆弘敞春秋拜掃可容數千指創造於宋大觀三年第十九代住山有需禪師內分三壙左右藏海眾靈骨虗其中以待住持者需公未幾移居雪峯遂終於彼後需之嗣第二十二代靖禪師每陞座手握木蛇時人稱木蛇和尚住持有年一旦日方中集眾上堂玄機雷動退座而寂火化以小瓦棺盛其遺蛻藏於中壙上位石龕內靖之後住持者俱各建塔無進此者然塔與寺同休戚頹廢有年天啟丁卯博山無異禪師重開法茲山清規稍復至崇禎庚午監寺始伐石修葺啟其壙以古骨石盡歸於左而空其右以待方來中壙石龕外則仍虗之也先師永覺老人自甲戌入山百廢俱復而是塔猶未竣工歷今凡五十有餘載僧眾雲來而右壙亦滿至大清康熈戊辰八月二十日監寺比丘法願慨捐衣鉢復啟塔重修乃移兩旁骨石歸於中左壙全虗而右壙餘者十分之一後來者左右俱可進也既封復造石座高尺餘葢滿三壙而塔身巍然峙立於上牢實堅固且無雨水滲入之虞復作塔圍二重以障山水至此而塔功大備俾同居者生有所託死有所歸而於古德建立叢林之意其殆庶幾焉雖然須知真身無相真塔無縫以如是塔藏如是身充滿法界了無欠剩既無四相之遷豈有三災之患此是吾人放身舍命真受用處視世之於髑髏作活而覔尺寸之土作千百年久計者詎不惑哉工竣因紀其歲月既盡其情而復發其理如此然理非事外事在理中夢幻泡影究竟不可得是在智者能深自觀耳是為記重興白雲廨院記白雲廨院乃鼓山白雲峯涌泉禪寺支院也鼓山始於唐建中四年從事裴公胄請靈嶠禪師誦華嚴經息毒龍損民稼穡之患奏置華嚴寺歷有年所後值會昌之厄僧眾逃匿鞠為榛莽凡七十載至五代梁開平二年菩薩國王王氏諱審知者乘願而來興隆三寶在處建立道場乃費鉅資四十餘萬重闢茲山鑿基伐石掄材選工大建寺宇巍峩壯麗輝暎巖壑請神晏國師卓錫大闡宗猷眾常萬指又於山之麓別建是剎取白雲峯額以白雲廨院為耕墾接納之所上下兩剎如身與臂互相為用而不可缺自是以來歷年八百主法者更八十餘代具載傳燈錄及本山列祖聯芳集其間建置因革損益不能殫述至明弘治辛亥下院災鎮守太監陳公道捐俸重建嘉靖壬寅上寺復災而僧眾盡歸於下院蜂房蟻穴人各為家漸至淪替崇禎甲戌春先師永覺老人來主是山時下院舊僧落落困於徭役未及十載亡沒殆盡而院遂廢乃請藤山諦公住持後又幾更主者皆不克振金像蒙塵荊榛滿目頹垣敗屋過者疑將壓焉最後住僧惟佳者勉守香火又一夕暴卒而院益無主順治丁酉先師示寂余忝守山門由是護法方公廣巖率眾紳士及善信張在輝等力請興復與上寺合一以還舊觀余不得辭黽勉祗受時大清順治戊戌夏也明年己亥監寺道悟成源募眾求大木於建溪盡撤朽弊重新架造前為三門中為普門殿後為大雄殿殿後為插鍬堂以居僧眾普門殿之右大倉場則仍其舊略為修改而已重裝金像贖回南北園果樹大方伯何公又於南園建殿以奉普賢大士時兩寺僧眾五百餘從上田產升合無存惟佃民田數百畆比丘有修苦行者願竭力耕作輸租之外取其贏以供眾不足則托鉢副之三門之前清溪瀠帶古榕繁陰度石橋右折而西數十武建通霄亭乃鼓山最初入門處三門之左過東際橋沿嶺而上名通霄路約十里許古松遮道石磴逶迤年久崩陷乃重甃甓直遠于寺路上共建五亭以便憩息至此而大局已周稍復古蹟因思此山始開於唐大興於梁唐晉漢以至宋元主席者皆法門龍象宗風丕振為東南大法窟入明寢衰至嘉靖以後廢墜已極盈虗消息理數常然先師重興涌泉二十餘年間百廢俱舉而不暇於是院余以綿力任之固不能一一仰合古轍庶於祖庭秋晚之日剔佛祖之殘燈開人天之正道接引四眾同歸覺地華嚴經云佛心無有他正覺覺世間其斯之謂歟願我後人共相勉勵撿身以戒明心以慧修稱性之行建無作之功仰法前蹤奮心企及庶不忝為佛之徒也此院自己亥重興歷年三十僧眾雲聚居常八百指外修苦行內勤禪戒往來憧憧接納不倦實涌泉之化城不可不紀其顛末以傳示來者因記之時康熈戊辰臘月朔日住山某記旅泊幻蹟旅泊道者住山既久諸禪者每以生緣道履見問因思一期幻蹟不足以示人淹滯三十餘載未嘗拈出近富沙南山啟鑰上座同徒郁文請之尤懃不容推諉於是略敘便概余名道霈乃先師所命字為霖則聞谷老人所賜也目號旅泊亦云非家叟本貫建寧建安丁氏家世奉佛父少軒公性任俠而實有陰德母朱事佛惟謹年三十無子禱於觀世音而姙有僧過門謂母曰汝所姙者佛子非汝子也母欣然曰若果生男當令事佛將臨盆腹中動轉母苦不堪忍乃密祝曰兒勿動兒勿動遂寂然既而再動復再祝寂然如故母喜曰此吾孝順子也遂生時萬曆乙卯歲十一月二日卯時也七歲入塾學授論語喃喃上口即麤曉大意輙為人講解眾以為異父喜曰大吾門者此子也年十四講上孟未終得病瀕死母日夜惶懼禱觀世音曰此本佛子非吾子病愈當令事佛已而病果愈遂遣出家父難之母曰此子非塵埃中物吾業已許佛久矣安用阻為父不能奪遂送歸郡東白雲寺禮老僧深公為驅烏明年落髮凡諸經業不由師訓誦之如流一日覩隣房僧死忽悟自身無常遂深厭火坑憤然有超方之志至十八歲聞谷老人自楚入閩居汾常之寶善余聞之驚喜曰古佛猶在耶即辭受業一鉢一衲飄然而去請問出生死路頭老人授以念佛畢竟成佛之說遂諦信不疑一日侍老人山行忽回顧熟視曰噫子可教也惜余老不能成褫子此去東谿荷山有永覺靜主真善知識也子能傾心事之必有所得余業已聞老和尚名茲承指示甚愜夙心明日將束裝辭去而老和尚適至老人遂以余囑託之老和尚唯唯命報侍左右令看栢樹子因緣汲水負薪罔敢忽怠崇禎甲戌春老和尚出世鼓山隨侍以至前後四年苦無所入一日自訴曰吾數載勤苦參禪既不會而學業又荒得毋辜負此生乎遂拜辭老和尚出嶺至杭州經歷諸講肆凡五年法華楞嚴維摩圓覺起信唯識及台賢性相大旨無不通貫屬聞老人遷化老和尚赴吊來真寂余即往見之正欲供通數年聽講經義老和尚忽問曰栢樹子話作麼生余茫然不知加答老和尚叱曰入海算沙有甚麼限禮拜而退不勝惶愧自是日夜不安寢食無味凡數閱月一日讀正法眼藏見臨濟示眾曰有一無位真人在諸人面門上出入忽然有省乃曰元來得恁麼現成回觀諸祖語錄勢如破竹了無滯礙復上真寂通所得老和尚徵曰山河大地與汝是同是別答曰豈有別耶老和尚以戒尺擊案曰汝為什麼不痛余不知落處老和尚曰汝須向這裏參始得余禮拜而去時密雲老和尚盛化天童遂往參禮一見即問曰山河大地與學人自己是同是別童便打余無語禮拜而退自是入室余只恁麼問童只恁麼打不勝迷悶經六閱月一日經行至三鼓昏倦已極將解衣就寢忽然虗空迸裂髑髏𪹼散全體現前如貧得寶如病得汗其踊躍慶快無以云喻遂危坐達旦次晨作偈呈方丈曰一水一山何處得一言一默總由伊全是全非難背觸冷暖從來只自知童閱罷顧謂西堂朝宗曰也不易渠到恁麼地復顧謂余曰如何是汝自知的道理余曰分明舉似和尚了也童曰舉似箇甚麼余便喝童擬拈棒余拂袖便出次日入室童問曰薰風自南來殿閣生微凉意作麼生余陵憑答曰薰風自南來殿閣生微凉昨夜火燒山弄得大家忙童曰不是這箇道理昔日某正同子見老僧不肯他乃致有今日之爭論也子宜於此體究始得余再拜而退乃私自念恁麼答有什麼不是處復念欲還真寂見老和尚吐露一上將請假辭去乃為同參兄弟苦留復強住一月乃作偈辭同參曰九上三登稱象骨吾今去住敢辭艱諸公道愛曾心銘故訂秋初再上山遂去真寂見老和尚禮拜起即以所悟白之老和尚喜曰子已入門但未升堂入室耳余曰更有什麼事老和尚曰子向後自知余禮拜退留兩月復辭去登西天目訪高峯死關凡一年因閱明教嵩和尚孝論遂念雙親垂老乃下山至真寂圓大戒辭老和尚還閩省親既而老和尚亦還鼓山復得時時親炙後結茅於大百丈山親貧每下山乞食以供甘旨及父歿遂度母出家同入山修淨業凡五載至庚寅正月母告寂哀毀治喪事竣復上鼓山老和尚曰參堂去因領維那職凡入室勘詰前所印可者皆翻案不許不勝迷悶一日老和尚謂余曰子還知病之所在否余曰不知老和尚曰雲門云達得一切法空隱隱地似有箇物豈非子之病耶余沉吟良久曰正坐此耳老和尚曰無妨放下便穩也余便禮拜一日堂中靜坐聞放生所中羣鵝噪鳴于耳根中三真實法一時現前動靜二相了然不生次日上方丈通所得老和尚曰前皆識境此智境也宜善保護遂示偈曰一番入處一番親親處何妨更轉身徹底窮源何所有眉下從來是眼睛余禮拜而退又一日老和尚示眾舉龐居士問馬祖曰不與萬法為侶者是什麼人祖云待汝一口吸盡西江水即向汝道龐大悟後來草堂青拈云許多魚龍蝦蠏向什麼處去老和尚云諸人試於草堂語下代馬祖下一轉語看余便喝眾下語竟老和尚復云諸人各能為馬祖出氣老僧看來馬祖語亦只得八成還有道得十成語者麼余下語不契被老和尚呵出歸堂一夜不安將抽解捲簾出堂正迷悶不覺撞破石門乃廓然開解泮然冰釋即衝口說偈曰哭不得兮笑不成觸瞎娘生兩眼睛有人問我西來意拳頭劈面沒疎親又曰烈𦦨光中木馬飛得便騎來即便騎當機覿面無回互擬議鋒鋩失却伊又曰法法本來法法撥與不撥俱傷便欲十成道出不覺滿口含霜次日偕同參明一上方丈禮拜曰某今日有箇十成語舉似和尚老和尚云汝試道看余乃背身叉手向老和尚云請和尚鑒老和尚云好與七藤條余便禮拜復呈前三偈老和尚頷之乃囑曰此事高而無頂深而無底不可以限量心入無限量法須于一切處及得淨盡始可保任余即再拜頂受後和尚時出洞上宗旨示之余一一答頌皆泯然契合時年已三十有八矣明年辭歸建寧廣福菴掩關三載密自煅煉切欲棧絕人世老和尚乃垂書誡之云佛法欲滅汝當勉勵不可因時難而自退也又值𡨥亂乃出關上山省覲老和尚曰吾待子來久矣仍令歸堂凡三年日加淘煉深資智證至順治丁酉老和尚年八十于正月上元日聲鐘集眾以平生所著僧伽黎麈拂見付說偈曰曾在壽昌橋上過豈隨流俗漫生枝一髮欲存千聖脉此心能有幾人知潦倒殘年今八十大事于茲方付伊三十年中鹽醬事古人有語不相欺逆風把舵千鈞力方能永定太平基余以法乳恩深黽勉拜受即日令首眾秉拂凡遇節臘皆代陞座示眾觀其提唱老人無不擊節稱善冬十月老人示寂明年正月入塔畢檀護方公克之林公孔碩率眾護法善信及諸山本山大眾強令繼席開法時戊戌正月念二日余年四十有四矣一住十四載雖座下常繞五千指愧無法與人徒結粥飯因緣耳至辛亥秋倦於接納適法姪石潮寧公入山省覲乃為林公孔碩議曰昔博山老人開法此山雪關繼之先師重興某忝繼之浪杖人曾住此山未有繼之者今寧公是其的嗣願請繼席以續浪公一脉某疲津梁因得休退是公之賜也公欣然力荷其事余即說偈辭眾曰本是無家客隨緣住此山俄經十四載乘興出松關即日拂衣去一眾涕泣挽留不可追至臺江而罷寧公以眾情向背不一亦不果住而余因得謝事深愜夙志時年已五十有七矣至建州復為眾留插草聚沙作空花佛事自是以旅泊僧自號隨緣漂泊住無定蹤若白雲若開元若廣福鏡湖諸處皆余杖錫往來之地後至東和之寶福乃稅駕焉因初離山數載間山中大眾每持眾護法書逼請還山絡繹於道余紿曰七十不掩息當歸矣俄爾間不覺年臨七旬又值靜公謝事純一一脉二監寺同時遷化山門無主由是眾護法僧眾請踐前約逼迫還山二三載間源源而來弗容少緩只得以老病殘軀舍己從人冐昧而至時康熈甲子四月廿有二日也還山上堂有屴崱峯頭雲一片乘風飛去又飛來作霖作雨渾閒事惹得虗空笑滿腮之語云余甞有願不另造塔葢不欲以臭髑髏費檀信膏血若終此山如亡僧常規津送茶毗拾骨入舍利窟眾塔足矣若終他山當處死當處埋萬勿移動此吾至囑不可違也余在鼓山有秉拂錄一卷鼓山錄六卷餐香錄八卷還山錄四卷在溫陵有開元錄一卷在玉融有靈石錄一卷在建州諸處有旅泊菴稿六卷法會錄三卷其集古有聖箭堂述古一卷禪海十珍一卷其懺悔法有八十八佛懺一卷準提懺一卷其修淨業有淨業常課一卷淨土旨訣一卷續淨土生無生論一卷註釋有心經請益說一卷佛祖三經指南三卷舍利塔號註一卷發願文註一卷其往復書問有筆語一卷以上共二十種四十四卷其纂述有華嚴疏論纂要一百二十卷金剛般若經疏論纂要刊定記略三卷護國仁王般若經合古疏三卷延津天寧體如剛公幼入緇門即遇知識知有宗門大事密自精研孜孜不舍今年越六旬而志不少衰每登鼓山請益一日讀還山錄大生喜樂即率其徒興瑞徒孫戒緋同捐衣鉢請梓流通苟非靈根夙植智種深培焉能有此昔日雪山亡軀香城破骨以求大法葢亦始此一念樂法之心耳刻工告竣敬為書諸簡末時康熈戊辰春王正月燈節非家叟題刻支那福州鼓山為霖禪師還山錄後序鼓山為霖大師被柔忍衣入寂慈室坐法空座開堂說法三十餘歲座下常隨眾五千指循循善誘如老婆憐兒孫謙謙度生如津梁大師誠天下之至柔乎及室中提宗印辨魔揀異則壁立萬仞七十四歲垂死而未肯許可一人則大師誠天下之至強乎然所謂於大師至柔也者非柔弱之謂柔和善順而不卒暴之謂也所謂於大師至強也者非強者之謂和而不流中立而不倚之謂也然是皆隨俗而稱大師者也若據實而論之則大師能柔能強而非柔非強沒量之大人超宗越格之大導師也猶非局守一機一境為了當比況與法門穿窬之小人色厲而內荏外現丈夫之相內無法守如兒女啗之以勢利則棄衣拂如泥土自家實亂法統而假名於嚴統誤認俗氣以為大機大用者不可同歲語矣大師先有初會語錄予昔年遣於京師印行今又鋟此錄而不怠者今日佛祖一綫之正脈纔係大師之言行也祝忝同曹洞之末流敢以愚言輕污末簡觀者無謂吾之亦有黨雖然吾之所不黨者私也情也所不能不黨者正也公也雖片言隻字無愧於辭時元祿癸酉九月廿八日見住薩州玉龍山福昌禪寺嗣祖沙門壽山祝謹題
