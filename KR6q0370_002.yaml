body:
  text: 侍者心亮録結冬示衆普説師云佛出世祖西來選佛壇場處處開冬夏安居窮底事一悟心空及第回還有與麼人麼良久云昔日初祖達磨大師見東土有大乘根器乃特航海而來直指人心見性成佛且道如何是他直指處豈不見梁武帝問朕即位以來印經造寺度僧不可勝數有何功德祖云無功德這箇豈不是直指又問如何是聖諦第一義祖云廓然無聖帝云對朕者誰祖云不識豈不是直指二祖問弟子心未寧乞師安心祖云將心來與汝安二祖云覔心了不可得祖云與汝安心竟豈不是直指自是以來六代傳衣五宗競出莫不用此道接人故見性得道者不可紀極如六祖問南嶽什麼處來嶽云嵩山來祖云什麼物恁麼來青原思禪師羣居論道師唯默然龐居士問石頭不與萬法為侶者是甚麼人頭以手掩其口又問馬祖祖云待汝一口吸盡西江水即向汝道僧問馬祖如何是佛祖云即心是佛問雲門門云乾屎橛又云麻三斤僧問趙州如何是祖師西來意州云庭前柏樹子臨濟三問黃蘗佛法的的大意三度賜棒如上皆是古人劈腹剜心覿面提持兩手分付無奈後人不唧𠺕聞説柏樹子便向柏樹子作活計聞説乾屎橛即向乾屎橛上討聞説即心是佛便向心中作妄想此所謂刻舟求劒錯過古人孤負不少所以此事也須是箇出世福慧男子方堪領荷方可入作苟非其人三門外無他立地處況入門耶所以此事看來大難大難雖然如是若是箇皮下有血的漢子一聞此語徹骨痛心發起真實志願決要此一著子明白了却無量劫來未了之生死悟明無量劫來未明之自心續佛慧命傳化將來報佛恩德若能如此要期敢保究竟成就所以古德云聖賢都是凡夫作何不依他㨾子修復云從上古德參方求道雖無箇作工夫的名字然大事未明一心在道念念不肯放過所以悟明有日直至宋朝始有看話頭作工夫之説當時只教人提起箇話頭看是什麼道理如大慧禪師每教人看箇狗子無佛性話謂盡大地是箇無字正當無明煩惱現前時一提提起云無如百沸湯中攙一杓冷水相似當下清涼去提話頭大約如是後來尊宿又令人痛起疑情以箇疑情發起悟機故云不疑言句是為大患大疑大悟小疑小悟不疑不悟如此作工夫得道者亦不可勝數至元始有作死工夫之説雪巖高峯諸大老自己既從死工夫上悟明故每以死工夫示人依之開悟得道者亦多總之有一片真實為生死心自然相應耳故云參禪無別訣只要生死切一分切便有一分工夫十分切便有十分工夫若不知有生死大事此人無參禪分雖然如是有箇不落生死的人畢竟是何面目良久云大衆久立珍重示衆師云南泉道不是心眼裏無瞳看得真不是佛百千相好難形出不是物大悲千手摩不著古人恁麼舉揚老僧恁麼判斷正如大慧和尚謂如福州人喫荔枝剝了皮去了核送在你口中只是不解吞老僧謂縱然吞得下又須吐得出直饒吞吐分明到鼓山門下始好喫棒是事且止只如堂中結制以來已經半月了也諸人還曾諦審諦觀自己分上切要事麼如何是自己分上切要事前日舉出箇生死兩字豈不是自己切要事又舉出箇不落生死底人令汝參究豈不是切要事如今人把生死二字只作口頭語看得尋常將謂此身百年可保只向髑髏上作計較殊不知無常殺鬼念念不饒一旦開交千載長往豈不空過一生若謂我再出頭來於佛法中參禪學道只恐不能必也若如實知得有箇不落生死的人自解憤憤地切切究明豈肯自寬如人識得自己室中有箇寶藏自然解將一把沒柄鋤頭東掘西掘忽然掘著噁元來只在這裏自得大受用慶快平生去也可怪今時人拾得一片瓦礫便謂是真金生奇特想生滿足想豈不自誤雖然如是只如古人道不是心不是佛不是物且道此語是真金是瓦礫鴛鴦枕上雙行淚半是思君半恨君珍重示衆師云前日舉出生死兩字未曾勦絶今日不免再為衆葛藤一上昔有僧問投子和尚曰四山相逼時如何投子云五蘊皆空大衆且道投子恁麼答話為是禪為是教若道是禪五蘊皆空有甚麼難會若道是教五蘊皆空豈易會耶須知五蘊即四山四山即五蘊果然悟得五蘊皆空更有什麼四山可得所以當時觀音老人修般若時照見五蘊皆空便千了百當更有甚麼苦厄可度若道度苦厄却成增語今時人只管念將去全不理會可不哀耶古德頌云五蘊山頭一段空空與五蘊是一是二同門出入不相逢逢即髑髏粉碎無量劫來賃屋住客作漢説他作麼到頭不識主人公主人公作麼生識如今人問他主人公箇箇道我會也十箇五雙只是認箇目前鑒覺昭昭靈靈時即有若睡著時即無生時即有死了即無殊不知這箇鑒覺是無量劫來生死根本認作主人公豈不大錯楞嚴經中呵為認賊為子是也故長沙和尚云學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人更有一等却引祖師語自印證云在眼曰見在耳曰聞在手執捉在足運奔遍現俱該沙界收攝在一微塵識者喚作佛性不識喚作精魂若果然識得喚作佛性不為分外如或未然只是箇弄精魂漢有甚麼共語處須知當時祖師此語雖是醍醐亦是毒藥還有人揀擇得出麼若揀不出更聽重説偈言醍醐毒藥齊拈出幾箇男兒識得真捉住虗空敲骨髓敲出後如何良久云鼻孔依然搭上脣珍重開戒示衆師云諸仁者多是千里數百里涉溪山遠來求戒即此一念已得戒了也是謂本源自性清淨戒無持無犯無染無淨無得無失萬德具足不假外求但以無量劫來內為結使所纏外為境緣所惑不得透露今日才發一念清淨求戒之心則此戒全體現前如雲開月出清光普照有何遮障然此本源自性戒亦名金剛寶戒謂堅固不壞也亦名無作戒體謂不從緣生唯從緣顯也所以三世諸佛已誦今誦當誦誦此戒也三世菩薩已學今學當學學此戒也三師授受受此戒也七衆證明證此戒也戒外無戒又何戒哉諸仁者若向這裏見得徹信得及則知登壇羯磨全體金剛道場展鉢披衣盡是舍那心地處處戒光照耀時時戒法流通可謂衆生受佛戒即入諸佛位位同大覺已真是諸佛子諸仁者既到這裏如八十翁翁入場屋豈是等間須是發真實心發廣大心發度生死心發度衆生心發求無上菩提心受此妙戒始於今日直至成佛於其中間驀直行去了無紆曲若能如此要期始名真正佛子真比丘僧也如或心行不真實願力不廣大甚至衣鉢苟簡逐隊登壇雖則於這片實地上投箇種子若望開花結果不知又在何時諸仁者人身難得佛法難遇一念回光即登戒品還知麼更聽重説偈言本源自性清淨戒大寶霾塵久不知一念淨心全體現黧奴白牯笑嘻嘻大衆久立珍重乙丑除夕示衆大地衆生未登聖果總在凡夫界中一年三百六十日日日十二時舉足動步開口動舌起心動念與理不相應處無非是罪此罪若有體性盡虗空界不能容受以性空故所以我佛世尊開懺悔門令其改往修來復還元淨且道如何懺悔普賢觀經云一切業障海皆從妄想生若欲懺悔者端坐念實相且道實相作麼生念昔日世尊因靈山會上五百比丘得四禪定具五神通未得法忍以宿命智通各各見過去世時殺父害母及諸衆罪於自心內各各懷疑於甚深法不能證入於是文殊師利承佛神力手握利劒持逼如來世尊乃謂文殊曰住住勿應作逆勿得害吾吾若被害為善被害文殊師利爾從本以來無有我人但以內心見有我人內心起時我必被害即名為害於是五百比丘自悟本心如夢如幻於夢幻中無有我人亦無能生所生父母於是五百比丘同聲讚歎曰文殊大智士深達法源底自手握利劒持逼如來身如劒佛亦爾一相無有二無相無所生是中云何殺大衆且道五百比丘過去生中殺父害母與文殊握劒持逼如來相去幾何若向這裏見得直下一刀兩斷福相不可得何處覔罪來如或未然且向葛藤裏薦取去大衆好箇世尊云住住勿應作逆好箇文殊師利爾從本以來無有我人但以內心見有我人內心起時吾必被害即名為害好箇五百比丘自悟本心如夢如幻於夢幻中無有我人及能生所生父母又好箇如劒佛亦爾一相無有二無相無所生是中云何殺若向這四箇好字見得徹信得及無量劫來煩惱障業障報障當處清淨如湯消冰一念化成無上知覺何況修行證入者乎如或不信不解恣己愚情造諸衆罪無所忌憚正恐袈裟下失人身又非地獄所比可不悲哉丙寅元宵示衆夜夜燃燈出世朝朝日面放光一年三百餘日為君子細商量且道商量箇甚麼良久云天地玄黃宇宙洪荒示衆師云古人得道之後或依衆遣日或深山蓄養惟恐名迹落於人間一旦果熟香飄龍天推出舍己從人乃是不獲已豈似今人有少聞見惟恐人不知亟亟然求售於人則其志趣卑陋可知矣又古人行腳只為見人未發明者朝參暮請求一言半句以開發性地已發明者求師決擇定其宗旨豈似今時人只在名色上著腳入一叢林出一叢林總無真實求法之心只是隨羣喫飯打野梩日過佛法興衰有自來矣今日特為大衆舉出洞山與密師伯參見隱山一段因緣作箇榜㨾使智者知慚識愧見賢思齊不至墮于流俗孤負平生乃云昔有老宿見馬祖得旨後隱於潭州之龍山不知幾許年人無知者一日洞山與密師伯偕行經由山下見溪澗中菜葉流出二人相謂曰深山無人何有菜葉隨流莫有道人居否乃議撥草瞻風沿溪行五七里忽見一茅屋中有老宿羸形異貌乃放下行李問訊老宿曰此山無路闍黎從何處來著語云從空拋直釣洞山曰無路且置和尚從何而入反釣釣漁人老宿曰我不從雲水來不向外邊求洞山又問和尚住此山多少年意在鈎頭老宿曰春秋不涉山中無歷日又問此山先住和尚先住且道山與和尚是同是別老宿曰不知一椎粉碎洞山曰為甚麼不知入海窮到底老宿曰我不從人天來亦不從佛位來又問和尚見甚麼道理便住此山敲骨打髓老宿曰我見兩箇泥牛鬬入海直至如今絶消息家破人亡後遍界絶行蹤洞山始具威儀禮拜又問如何是主中賓老宿曰青山覆白雲豈不見洞山後來道青山白雲父白雲青山兒白雲終日倚青山總不知又問如何是主中主老宿曰長年不出戶從來一雙足曾不到人間又問賓主相去幾何老宿曰長江水上波是一是二又問賓主相見有何言説老宿曰清風拂白月木人方歌石女起舞洞山與密師伯禮謝辭退老宿乃述偈曰三間茅屋從來住空中樓閣一道神光萬境間心外無法滿目青山莫把是非來辨我龜毛縛太虛浮生穿鑿不相關徒勞心力從茲燒菴深入不見後人號為隱山和尚也是虛空安耳朵大衆隱山是得道後住山第一箇㨾子洞山與密師伯是行腳見人第一箇㨾子洞山前四問辨主後四問請益洞山隱山既是作家相見一問一答絲來線去各有來由句句歸根不帶枝葉洞上四賓主話源出於此雖然如是只如隱山燒菴深入不見且道他畢竟向甚麼處去良久云只在此山中雲深不知處大衆珍重示衆昔先師老人嘗云豫相依博山師兄凡三年未聞一語滲入情識博山有造於豫者大矣霈上座親依先師會下二十餘年一言一行未見落於世諦其所造就豈淺鮮哉所以古人常教人離心意識參出凡聖路學最為親切今時人不肯遵行只在心意識上搬弄全不知有離心意識一著子只在凡聖路上行不知有出凡聖底路頭故九峯虔和尚云擬將心意學禪宗大似西行却向東所以愈行愈遠愈親愈疏法門之衰有自來矣雖然如是只如離心意識作麼生參霈上座道實無參者出凡聖路作麼生學箇中無學路只如箇中無學路是學不是學實無參者是參不是參只須恁麼學始是真學恁麼參始是真參到這裏始有參學分不然只在門外打之繞有甚麼了期豈不見昔日藥山一日在石上坐次石頭問曰汝在這裏作麼曰一物不為頭曰恁麼則間坐也曰若間坐即為也頭曰汝道不為不為箇甚麼曰千聖亦不識頭以偈讚曰從來共住不知名任運相將祇麼行自古上賢猶不識造次凡流豈可明又一日藥山坐次有僧問兀兀地思量箇甚麼山曰思量箇不思量底曰不思量底作麼生思量山曰非思量大衆好箇一物不為若間坐即為也好箇千聖亦不識又好箇思量箇不思量底不思量底如何思量非思量若向這裏的的識得古人落處離心意識參出凡聖路學有什麼難且道古人的的意畢竟作麼生良久云大衆人身難得正法難逢只須領荷毋得自輕好珍重示衆昨日維那請益覺經四句未曾結局今日於大衆前不免重葛藤一上圓覺經中道居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實圭峯宗密禪師云忘心頓證大衆若要頓證的須忘心若不忘心何由頓證所以動念息念了知辨別皆墮心病不能證也後大慧杲禪師頌云荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨花蛺蝶飛若也直下見得所謂頌即是經經即是頌非欺我也今日鼓山亦有一頌須彌騎日月大海跨泥牛走遍塵沙國從來不記秋且道此頌與圭峯大慧是同是別若也揀得出許渠具眼大衆如來禪祖師禪一齊拈出布施了也更有佛祖未出世已前一著子如何通得箇消息去良久云寧可截舌不犯國諱示衆舉大般若經曼殊室利分佛告文殊曰汝於佛法豈不趣求文殊答曰我不見有法非佛法者何以趣求世尊曰汝於佛法已成就耶文殊答言我都不見法可名佛法何所成就世尊曰汝豈不得無著性耶文殊答曰我即無著豈無著性復得無著師云世尊三問問問在文殊足下藏身文殊三答答答在毗盧頂上獨步須知毗盧頂上不離文殊足下文殊足下只在毗盧頂上忽有箇人類精奇底向這裏直下見得徹信得及擔荷得去從文殊一門深入驀直歸家更有何事雖然如是只如最初入門一句作麼生良久云誰為文殊誰是文殊示衆師云昔臨濟老人於黃檗手中喫棒向大愚脅下還拳如空合空了無縫罅後來壽昌師翁頌云醍醐上味出乎乳滴水攙中總不成三十棒頭開正眼何曾傳得祖師心可謂徹骨徹髓矣雖然如是更須知臨濟中夏上黃檗一段因緣今日不免舉似大衆去也臨濟中夏上黃檗山師云貧兒思舊債見檗看經乃云將謂是箇人原來是箇唵黑豆老和尚敲空作響住數日告辭檗曰子破夏來何不終夏去仁義道中濟曰某甲暫來禮拜和尚檗便打趂令去理合如是濟行數里疑此事却回終夏這一疑疑殺天下不疑者後又辭檗檗曰甚麼處去濟曰不是河南便歸河北全身拋擲檗便打濟約住與一掌檗大笑似水投水更無異味檗喚侍者將百丈先師禪板几案來勾賊破家濟云侍者將火來一狀領過檗云不然子但將去已後坐斷天下人舌頭去在憐兒不覺醜大衆舉已舉了判已判了只如臨濟當時行數里疑此事却回終夏且道他畢竟疑箇什麼聽取一頌自是峯頭更有峯木人飛上絶行蹤可憐天下無疑者甘坐朧薄霧中大衆珍重示衆舉乾峯和尚上堂云法身有三種病二種光須一一透得始解歸家穩坐更須知有向上一竅雲門出衆問云菴內人為甚不知菴外事峯呵呵大笑門云猶是學人疑處峯云子是什麼心行門云也要和尚相委峯云只須恁麼始解歸家穩坐門應諾諾師云雲門得道後遍參洞上尊宿深得洞上宗旨疏山乾峯皆有機緣乾峯三種病二種光雲門出世特為發明云光不透脫有兩般病一切處不明面前有物是一透得一切法空隱隱地似有箇物相似亦是光不透脫法身亦有兩般病到得法身法執不忘己見猶存墮在法身邊是一直饒透得放過即不可子細點檢將來有什麼氣息亦是病古德嘗有言老僧不解説禪只是識病二種光三種病雲門若非親見乾峯親悟親證焉能一一拈示於人作箇人天眼目雖然只如乾峯云法身有三種病那一種雲門為什麼不舉出子細簡點來更須知有向上一竅豈不是病何故不見道堯舜之君猶有化在且道究竟事作麼生召大衆云喫茶去示衆師云若論此事只在目前一切成現若是夙有靈骨底如放爆竹相似輕輕點著便爾全身𪹼散聲震寰宇豈不見溈山於百丈一星火中輝天鑑地臨濟於黃檗三頓棒下徹骨徹髓洞山因過水覩影而五位昭然雲門為睦州折足而命根頓斷法眼向庭前片石究竟唯識唯心透頂透底從此五宗諸祖以及從上老古錐自利利他莫不皆用目前成現這一著子徹困為人如打地和尚有人問著只是打地祕魔和尚有人問著只是擎叉乃至普化搖鈴禾山打鼓皆是劈腹剜心全體拋出無奈孤負者多知恩者少至於今日一隊不唧𠺕漢只是認定箇册子全不知册子裏説底是什麼如韓獹逐塊相似何堪共語雖然如是十室之邑必有忠信三五百衆中豈無一二賢達於言前得旨句外明宗者乎若有喚來與痛椎一上庶此一線之脈不至廢墜豈不慶幸如或不然三十年後切莫道曾在鼓山親近來好示衆師云昔日長慶會下有子昭首座與大法眼禪師同參聞法眼出世特往相見問曰和尚久參長慶為甚麼却嗣地藏法眼曰我不會長慶一轉因緣昭曰何不舉來眼曰長慶道萬象之中獨露身意作麼生昭豎起拂子眼曰此是當年學得底畢竟意作麼生子昭無語法眼云只如萬象之中獨露身為撥萬象不撥萬象昭曰不撥眼曰兩箇昭隨聲云撥眼曰萬象之中獨露身聻昭於是發明遂嗣法眼更不開堂師云嗣法乃出世大事因緣上續佛祖慧命下開後學智眼差之毫釐失之千里苟少差遲自誤誤他其害非細當時法眼不會長慶一轉因緣不敢冒嗣長慶其不欺心如此子昭於法眼言下發明遂嗣法眼其虗心如此二尊宿乃從上參禪嗣法榜㨾後學有志者可不於此憤心企及哉雖然如是長慶道萬象之中獨露身撥萬象不撥萬象猶是藥病對治之言且道長慶意畢竟作麼生良久云春潮帶雨晚來急野渡無人舟自橫示衆師云前日恆濤禪人入方丈問萬象之中獨露身是何意旨老僧陵憑答曰露渠云在甚麼處露老僧道在汝眼裏露耳裏露鼻孔裏露舌頭上露乃至四大髑髏無明妄想以及殿閣樓臺僧堂厨庫大地山河何處不露渠曰不會老僧曰會也露不會也露渠禮拜而去雖然如是只如今日有箇無眼耳鼻舌身意底來向他道在甚麼處露良久云遍界不曾藏佛眼覷不見示衆師云昨夜夢中作得四首夢頌今日不免舉似大衆乃云夢中人所作夢中中聚觀俄傾二俱散曉月上欄杆其二曰夢境元無有夢境亦不無有無俱是夢何用費工夫其三曰開眼作夢時即是閉眼夢親見本來人方知元不動其四曰夢裏千般事事事盡無生的悟無生旨泥牛海底行大衆昨夜夢中作的今日舉的大衆聽的且道是同是別良久云目前無闍黎座上無老僧結冬示衆師云今朝十月十五打動喧空石鼓四大天王提出寶刀謹守門戶直得蚖蛇蝮蝎藏竄無門虎豹豺狼回避洞府風以時雨以時百穀苗稼處處豐熟空王拱默無為智臣一何所事正當恁麼時安家樂業一句作麼生夜明簾外風光靜鼓腹謳歌頌太平七期示衆師云今時人參不得禪蓋為不信有離心意識一著子只向心意識上搬弄工夫不得成片縱稍有所見不得與見處相應搬弄到臘月三十日一場懡㦬今時人大約如是然者箇心意識來自無始根蒂既深卒難為他倒斷所以從上諸佛諸祖苦心苦口遺下許多長言短語所謂將這蜜果子換却你苦葫蘆換去一箇即得一箇換得盡始是丈夫只如佛祖有什麼長言短語釋迦老子云心之可畏甚於毒蛇惡獸冤賊大火越逸未足喻也釋迦老子只是要我等識得不至認賊為子耳永嘉云損法財滅功德莫不由茲心意識是以禪門了却心頓入無生知見力且道這箇心作麼生了不見道過去心不可得現在心不可得未來心不可得只這不可得是三世諸佛歷代祖師放身捨命處華嚴論主云但能一念緣起無生超彼三乘權學等見即今與大衆聚會説話豈不是一念緣起作麼生説箇無生底道理良久云才生不可得不貴未生前雖然如是只如今日搬出這一絡索與大衆打葛藤且道是心意識非心意識會麼泥牛逢石虎相看各自休珍重示衆雪峯祖師云望州亭相見了也烏石嶺相見了也僧堂前相見了也意作麼生乃云甚麼處不是雪峯鼓山則不然望州亭不相見烏石嶺不相見僧堂前不相見意作麼生乃云甚麼處是鼓山雖然如是只如今日大家在這裏眼眼相覷耳耳相聞是相見是不相見師襄無目看還的師曠能聰聽似聾元宵示衆師云今夜元宵屆節然燈古佛出現於世放大光明普為大地衆生一時受記成佛釋迦不先我等不後一道清淨平等平等何者以實無有法名阿耨菩提然燈佛為我授記若有法名阿耨菩提然燈佛則不為我授記大衆還信麼還肯麼若自信自肯説箇授記也是頭上安頭若也不信無奈然燈佛鋪箇漫天網子無你回避處知麼家家門前火把子時時照見夜行人珍重示衆舉壽昌師翁示博山和尚偈云空拶空兮功莫大有追有也德猶微謗他迦葉安生理得便宜處失便宜大衆師翁指出一條大道不特為博山發藥直令天下後世人驀直歸家可謂婆心徹困恩大難酬今日不肖兒孫如何為他發明空拶空兮步步踏上通宵路有追有也心心投入荊棘林要知迦葉安生處𪹼破全身喪古今𪹼破後如何喝一喝云喚甚麼作迦葉佛涅槃日示衆無憂樹下虗空生雙林樹下虗空滅試問虗空生不生試問虗空滅不滅箇中定當得分明何妨證龜而作鱉稽首南無釋迦尊稽首南無乾屎橛須知我法妙難思大家止止不須説喝一喝示衆舉僧問古德深山巖崖中還有佛法也無古德云有僧云如何是深山巖崖中佛法古德云奇怪石頭形似虎火燒松樹勢如龍師云頭頭上明物物上了則不無古德若是深山巖崖佛法猶隔山在今日有人問鼓山深山巖崖中還有佛法也無亦答云有若問如何是深山巖崖中佛法但向他道深固幽遠無人能到且道與古人是同是別若揀辨得出許渠具眼示衆舉僧問雲門如何是一大藏教門云對一説又一日僧問不是目前機亦非目前事時如何門云倒一説師云一是什麼而可對對是什麼而可對一又一是什麼而可倒倒是什麼而可倒一韶陽老人以慈悲之故乃有落草之談今日鼓山則不然若有人問如何是一大藏教但向他道茶裏飯裏若問不是目前機亦非目前事時如何向他道眼裏耳裏且道與雲門是同是別會麼易分雪裏粉難辨墨中煤珍重結夏示衆師云年年四月十五不論西天東土三月禁足護生家家謹守門戶且道生作麼生護豈不見龐居士云護生須是殺殺盡始安居會得箇中意鐵船水上浮鼓山道法法無生法心心寂滅心千聖同源處日午打三更大衆且恁麼安居好珍重示衆舉溈山一日坐法堂上庫頭擊木魚火頭擲下火叉拊掌大笑溈山云衆中也有恁麼人遂喚來問汝作麼生火頭云某甲不喫粥肚飢所以歡喜溈山乃點頭後來鏡清云將知溈山衆裏無人臥龍云將知溈山衆裏有人鼓山道溈山衆裏有人畫出虗空眉目溈山衆裏無人摟却金剛眼睛只如庫頭擊木魚火頭擲火叉溈山點頭意畢竟作麼生三箇柴頭品字煨不用援毫文彩露雖然如是只如鼓山今日坐法堂上大衆簇簇上來禮拜了排班立聽老僧口喃喃地談今論古説黃道白為是有人為是無人若道無人為什麼聞鐘聲即來若道有人為什麼聞鐘聲不來來是阿誰不來又是阿誰良久云大衆歸堂各自參詳好示衆舉龍興宗靖禪師初參雪峯發明心要即承印可乃誓充飯頭服勞十餘載一日袒一膊於衆堂中釘簾雪峯見而記曰汝向後住持有千衆其中無一人衲子也靖禮謝悔過後辭歸台州錢王請住龍興衆滿千餘皆三宗誦習之徒果如雪峯所記師云時當末法叢林凋晚人根淺陋求一真實三宗誦習者不可得況衲僧乎且道衲僧畢竟有什麼長處良久云若不同床睡焉知被底穿示衆舉僧問洞山和尚尋常令學人行鳥道如何是鳥道山云不逢一人曰如何行山云只須足下無私去曰行鳥道莫便是本來面目否山云闍黎為甚却認奴作郎曰如何是本來面目山云不行鳥道師云洞山恁麼道可謂棒打石人頭嚗嚗論實事親切為人也雖然更有一頌不免舉似大衆鳥道行兮與不行看來猶自涉途程本來面目無藏處任使僧繇畫不成示衆師云若論此事雖是現成底然參究悟明亦係乎因緣時節躁求不得也故古德云知有此事但念念不休又云以歲月磨之無有不得者所以昔日雪峯山登投子九上洞山求師決擇後乃於鼇三店上成道長慶稜禪師二十餘年往來雪峯玄沙之門坐破七箇蒲團後因捲簾始大悟雲巖二十年在百丈心燈不續後見藥山乃克了當此是從上大善知識用工如此之久得道如是之遲故能續佛慧命震耀古今豈似今時學人入耳出口亟亟然求售於人究竟濟得甚麼邊事於自己分上有甚麼交涉又世尊嘗以彈琴示學人用心謂緩固不可而急亦不得心若調適乃可得道於道若暴暴即身疲其身若疲意即生惱意若生惱行即退矣其行既退罪必加矣但清淨安樂道不失矣大衆此清淨安樂四字乃釋迦老子劈腹剜心尅骨示人若也知得信得即粉骨碎身無由報答若也不知不信是自誤也豈獨今生只恐無量百千萬劫皆從這裏錯去知麼珍重示衆舉昔雪峯因僧來參問甚麼處來僧云浙中峯云船來陸來僧云二途俱不涉峯云爭得到這裏僧云有什麼隔礙峯打了趂出僧後十年再來峯問甚麼處來僧云湖南來峯云與此間相去多少僧云不隔峯豎拂子云還隔這箇麼僧云若隔爭得到這裏峯亦打了趂出僧住後每見人必罵雪峯同行聞得特去相訪問你為什麼罵雪峯僧舉前兩段因緣同行痛罵與伊點破其僧悲泣每中夜焚香望雪峯禮拜師云奪食驅耕是雪峯老人尋常手段滿把黃金當面擲亦是徹困婆心這僧兩番錯過焉得不罵若非同行點破罵到彌勒下生也未有了日在雖然如是今日要這箇會罵的僧也難得敢問大衆只如雪峯兩處行令甚麼處是奪食驅耕甚麼處是滿把黃金當面擲若向這裏簡辨得出許渠具眼結冬示衆今朝十月十五冬月安居得所大家脫落身心石頭原是猛虎一箭射透那邊法法了無間然泥牛𨁝跳過海木馬驟飛上天且道是阿誰分上事良久云上大人丘乙己誕日示衆師云世尊拈花遠觀山有色迦葉微笑近聽水無聲吾有正法眼藏涅槃妙心付囑摩訶迦葉護持傳化無令斷絶落花有意隨流水流水無心戀落花雖然如是只如無憂樹下右脅降誕又作麼生昨夜鐵牛懷犢子天明生得白烏鴉戊辰元旦示衆師云昨日舊年尾今日新年頭新新常不住歲月去如流其中有一人歲月沒交涉新舊更非他常在動用中動用中蓋覆不得若端的識得此人如子得母始有參學分如或不然長年門外打之繞向文字上搬弄根境中作活流落天涯跉𨂲辛苦是誰之咎雖然如是且道此人畢竟如何識得他良久云了了見時無一物未生前驗更分明示衆師云前日落堂論箇不二法門尚未勦絶今日於大衆前不免重為舉似貴在大家知有乃云盡大地是箇不二門盡古今人總在裏許出入往來了無遮障所以當時毗耶離城一會三十二菩薩恁麼説維摩居士恁麼默文殊大士恁麼贊為後來者作箇指路底牌子若不撩起便行翻成鈍置直饒更道箇説時默默時説大施門開無壅塞子細看來求親反疏爭似今日現前大衆聞鐘聲即上來禮拜了便下去歸堂底歸堂歸寮底歸寮驀直而行有什麼阻滯雖然如是只是不得動著腳指頭動著三十棒垂問五則一問父母未生前即不問死了燒了道一句來二問釋迦未出世達磨未西來什麼人主持佛法三問禪道佛法拈向一邊實地上道一句看四問如何是無垢佛五問如何是離垢佛
