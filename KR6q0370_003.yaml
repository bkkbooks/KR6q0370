body:
  text: 侍者法雲録佛事還山禮開山興聖晏國師塔八百年前老古錐通霄一路幾人知古今無間真消息但看今朝覿面時覿面一句作麼生遂燒香禮先師老和尚塔癡兒不解事處處揚家醜今日忽歸來一物無所有此一瓣香爇塔前青松白石還依舊達磨初祖忌九年面壁一句安心以訛傳訛直至於今謾言隻履西歸去遍界腥風起少林壽昌師翁忌黃龍峯與屴崱峯鬬額大好山與山不好廝罵今日應時及節不免一齊列下一杯青茗一爐香千古萬古作話真寂師太忌出山已有年處處逢歸忌今日忽歸來亦復難回避大衆真寂老人來也梅華不鬬雪向日競敷榮先師老和尚忌吾師昔日不去去今朝依舊不來來坐斷上頭無貴位寒梅雪裏一枝開掃廩山蘊空老祖塔巍巍祖塔千峯上腳下青青盡好山今日重來掃寒葉慈容半掩白雲間掃壽昌無明師翁塔多年不掃師翁塔師翁塔影遍三千今日瓣香重舉似黃龍峯頂浪滔天掃雲棲蓮池老師太塔二首付衣付拂遍天下舉國禪流盡若狂不是吾翁開淨業未知何處問津梁乙卯之秋翁正生乙卯之冬孫正滅翁孫覿面忽相逢拈出紅爐一點雪掃瓶窑聞谷老師太塔二首鼓山寶善與瓶窑三處參承敢憚遙大法蒙翁親指示蚊虻飲海愧難消師翁滅度五十載三度心香爇塔前若問吾翁端的旨千峯環拱白雲邊掃古德老法師塔二首雲棲門下古彌陀弘闡西方功最多我憶當年曾預席至今法語尚哆啝今年年是昔年年一片栴檀爇塔前莫謂死生成永別須知師道絶中邊掃新伊老法師塔二首五十年前曾送難蒙師剖訣了無疑台衡性相家傳遠法雨洋洋宇內知今日遙持一瓣香法華山上禮空王謾言閩浙隔千里試看青煙透上方掃靈源老法師塔二首台相親傳自土橋幅巾登座自逍遙晚年始具比丘相法澤汪洋似海潮昭慶堂中親送別涅槃瑞相世希聞而今白塔埋青草千里心香何處焚掃雪松老法師塔二首當年問道至崇光半載相依論議揚頻舉色香中道義一家教觀已圓彰龍樹菴中白塔存法身無恙已忘言瓣香覿面親拈出月印澄潭豈有痕先師老和尚百一十歲慶忌拈香師年百一十遍界放光明石鼓雲中吼泥牛海底鳴非凡亦非聖無滅亦無生無量百千劫古木鎮常榮只如今日特申慶讚一句作麼生良久云我適曾供養今復還親覲偈宗門懷古十首有引禪風已頽勢莫可挽乃作懷古十首用寄仰止之思與有志者共之潭州隱山和尚此山無路誰能入洞密忽來開闢之覿面清風拂白月茅菴何用更深移亮座主喚得虗空解講經伎心盡處更醒醒西山一去無消息萬古峯巒色轉青明州大梅山法常禪師曾向西江親得旨大梅深處善藏身浮雲反覆心無改松食荷衣道不貧襄州龐居士有男有女不婚嫁共向諸方論道情百萬家財付湘水漉籬從此起家聲船子和尚匡徒領衆非吾事得箇金鱗即便休一自釣船翻却後青山緑水共悠悠陳尊宿臨濟雲門遭活陷藏身露影孰能知間房古寺編蒲屨惡辣機鋒閃電遲芙蓉楷禪師太陽道至師方盛舍命傳持豈受名寧犯逆鱗甘貶謫曹溪從此又澄清清素尊宿執侍慈明十數秋遵師遺命自埋頭龍安狹路相逢著末句傳來滿面羞石頭菴主義虎翻身事不輕緑蘿深處謝間名謾言禪逸福不逮贏得高眠夢幾生高峯和尚枕頭落地有何事直入千峯自掩關以死為期君不見高風萬仞絶躋攀鼓山即景四首萬松繞寺萬松浮翠擁禪林龍象家山自古今不用老僧頻指點風濤日夜為傳心喝水遺蹤削壁天開巴峽同怒雷常吼此山中誰云水是無情物一喝回頭萬籟空靜夜鐘聲鯨鐘百尺危樓上寂寂三更月色新遙杵一聲山嶽震等間驚起坐禪人深更佛號此身拋在匡床上夢去橫生執著情佛號一聲親喚惺方知這裏已天明乙丑春日謝簡生廣文偕啓鑰開士入山見訪同遊喝水巖烹龍泉上鳳坡縱觀諸勝并讀石壁先賢遺迹不勝古今之慨喜翁訪我鼓山中此日偕遊興自同石上古人皆已已亭邊過客尚匇匇龍頭活水烹新火鳳尾蒼苔踏舊蹤極目縱觀何所有長江日夜競趨東臧喟亭中翰入山見訪劇談淨土作此似之葉落驚秋早逢君話道遲謾疑佛語妄須信自心迷忍界平終險娑婆此云堪忍樂遠可期劉雷蓮社首晉劉遺民雷次宗入廬山蓮社遺民先生淨土遠公終時見遺民侍阿彌陀佛來迎曰師先我發心來何遲耶千古有芳規壽陳濟之居士一別十餘年此世幾更變今日忽歸來喜君重覿面惟君豪氣王靈機如掣電即此徵壽元時辰能自轉嗟余衰頽甚百無一可羡終日唯閉門課經一兩卷聞君六十五華堂置高宴賓客如雲從歡聲動畿甸匇匇述俚言為君祝綿衍一展雪壁中相看兩不厭壽王海印州守林下休官喜見君年高七十已稀聞心同止水涵虗碧貌似神仙淨俗氛桃李花開春正暖煙霞興逸道方殷遙思堂上羣英集共仰南山篆彩雲吳石凝居士入山圓戒適值六帙大壽偈以祝之花甲初周日親登石鼓壇頓圓三聚竟豈憚四弘難事事菩提滿心心法界寬壽山高萬仞喜與衆同觀送素中耆德還真寂二首親自雲棲法窟來源深流遠思悠哉兩山監寺施全力行業巍巍絶點埃此去正當初夏日歸心無計為君留危灘百折俱遊遍始信家山在上頭願施有錢無施心有心無錢施求者絡繹來白眼空相視由昔有慳病感此不如意願伏藏隨身生生恣給濟浴佛偈念念護明下生時時悉達出世香海灌沐金軀法界周流不異我觀大地衆生與佛平等無二垢淨一時洗却當處頓超覺地挽謝廣文簡生居士二首底事相期已念年切磋往復痛加鞭一朝葉落歸根去笑破羲皇未畫前一性圓明無起滅死生來去悉皆真樂慈父親垂手又見華開劫外春答天河老衲二首錦鱗簇簇金波上跳躍無因上直鈎唯有不貪香餌者始堪擕手話同遊老僧八十世尤稀詩頌盈編慧業微須信當時賣柴漢不諳一字却傳衣挽惟深耆德二首却憶昔年曾問法滔滔雄辨見當機聖人有所不知處正在如今撒手時紫雲深處建蘭若彈指功成願行深八十歸家何所有遺風餘韻撼叢林送遠齋禪師遊五臺二首此去臺山路七千吉祥步步與同緣金剛窟內重相見拂袖歸來氣藹然翠微深處久安禪南北東西不涉緣一旦六環飛出後天華飄渺落階前壽郁文靜主華甲初度髫年入道事空王抖搜塵埃染戒香已了三心不可得方明一性自圓彰雲邊種竹存虗節嶺上栽松傲雪霜六甲循環數莫盡滔滔歲月等滄浪示毒海闍黎四偈有引毒海闍黎少年讀經不由師訓即能通貫文義況今日乎其聞熏種子有自來矣乙丑春再上鼓山同住兩載將別去無可為贈乃作四偈送之然語固鄙拙大約家常荼飯日用所需不可少耳闍黎勉旃宗教凋零日秉志在堅貞一片無瑕玉勿使玷青蠅靈山標月指既已解傳持隨識不隨智蓮華沒汙泥詮旨雖無異水乳亦須分鵝王能擇乳自不墮鵝羣蠱毒鄉中水輕沾即爛腸若能傾吐盡噴水百華香高固齋居士遊東謁大司馬吳公偈以送之送君遊古正值炎夏時荔熟香盈路雲開月到池人生貴志合道妙在心知吐握相遲久行行慰所思藍公山人過訪以詩見贈次韻奉答夙擅青藍譽紛傳喬梓名筆端天籟發胸次臥龍鳴夜靜月如洗秋來氣倍清何時重聚首促膝話無生琉球國中山王求偈書此贈之巍巍宮闕涌中山山海高深自作關玉葉千秋傳益盛金甌永固治常間鳥啼華笑真機發魚躍鳶飛大道還遙憶唐虞垂拱世淳風猶喜在其間挽王海印州守二首遺文惠我談真壽手墨淋漓尚未乾忽報君歸天際去清風襲我骨毛寒壽相元空一性存金剛不壞妙難言四山推倒同尸解剎剎塵塵不二門贈莆田林玉山文學秋風方鼓翼鵬舉竟何之天爵根忠信人文起孝慈萱堂年老老菽水奉孜孜長思貴己者得此復奚為為王明侯文學題南湖小影西南兩湖皆禹迹南湖深遠無人識一旦重開面目全與君面目何相即贈日國玄光禪師毫相放光來震旦獨菴獨語遍叢林荷擔大法施全力宗説圓明貫古今淨土四首愛重繫娑婆愛斷生極樂心淨佛土淨此語終不錯若欲淨自心須知心本淨只因隨妄念如塵翳明鏡即此清淨心念彼清淨佛因真果亦真不用生疑惑千經與萬論共指西方路今古往生者不可知其數無垢佛自性天真佛原不涉途程無垢還同垢金塵落眼睛離垢佛無始未曾悟塵垢久深埋離法同磨鏡靈光漸漸開總偈性淨云無垢修淨得名離修性無差互木馬火中嘶贈陳越山居士淨業馬鳴龍樹有真傳禪淨圓明不墮邊是佛是心原一體非心非佛本無偏四季洗珠須換線專勤淨業勿添緣西方大道如天濶驀直歸來路坦然頌女子出定示濟汪禪人不出而出出而不出大小女子本無面目出與不出不干他石人眼裏不著沙可憐逐逐風塵者笑倒靈山老作家贊世尊出山像贊雪山六載忍飢凍贏得間名滿世間大驚小怪呼成佛多少人天被熱瞞我觀如來真實相危然默坐蒲團上身心寂滅等虗空贊之毀之俱是誑究竟推尋不可得不可得中只麼得雲門當時欲行棒不知早已先著賊阿彌陀佛接引贊為龔岸齋居士題我佛真身周法界遍入衆生心想中行人一念念佛時無量壽尊全體現我身佛身無有二互相攝入盡無餘同時遍滿法界中接引羣生歸淨土佛子應作如是觀亦應發此廣大願願觀親從法界流盡未來際無間斷賓頭盧尊者贊親受靈山囑付來留身應供福田開時時到此形枯稿肉眼模糊莫浪猜曾聞尊者親見佛䇿起眉毛會也麼覿面相呈君不見風吹別調又蹉跎十八羅漢贊兩株松下一箇老僧支頤而坐心地如冰童子手中經未展箇中字義已分明松下趺坐手持錫杖指點阿誰兩箇侍者大隨小隨他家眷屬一羣子付與空王老古錐二獸相隨穩坐樹頭無法可説捧珠以獻分明漏泄驀劄相逢證龜作鱉説法獻珠一老一少非師非弟喃喃共語論第一義手卷貝葉各持來大似軒轅書契二人偶語這箇業畜調來可駕要騎便騎要下即下等間撞著木人不免將他一嚇跨獸出山四箇老古錐聚頭説甚麼即心即佛可憐生非心非佛尤懡㦬唯有梧桐葉正濃清風襲襲樹頭過四人聚論奇形怪獸何異家犬跨之西東即近而遠弟子持爐引導前兩箇回頭意欲返騎獸欲返三人同心一具度海業浪翻空晏然自在縱橫出沒任優遊何曾打溼這布袋三人度海神龍出海雪浪滔天穩坐其中出沒自然五濁惡世浪尤險幾箇男兒得出纏海中騎龍威獰之性久已調伏蹲踞巖前何異家畜大空不在小空來向道目前無一物巖前伏虎跨著貔貅一任遨遊隨流得妙樂矣忘憂問渠家在何處從來不與汝同儔跨獸遨遊六祖大鑑禪師贊獦獠傳衣一字不識宗通説通中天杲日二支五派曹溪浪沸源遠流長今古洋溢夫是之謂第六代祖八十生來大知識廬山遠公法師贊護法菩薩來居東方神以誠致道以德揚荷負大教開闢蓮至今池上白藕華香清涼國師贊乘願而來續佛慧命入法界海佩毗盧印東流聖教非師莫定雜華大經非師孰正疏之鈔之字字心鏡涌真法乳哺真法胤巍巍五頂草木皆香萬年堅冰毛骨清涼棗柏李長者贊生為帝胄隱於方山掀如來藏破祖師關即俗而真即事而理論法界經字字歸己天女送供猛虎馱經心境俱寂遊雜華林一念無生超賢越聖當陽拈出毗盧正印陳越山居士贊好道根天性舉事出剛腸為人如為己知微亦知彰五車既讀盡三藏復參詳祖父家傳遠為佛作金湯曾蓮居居士行樂贊這漢子自何來靈苗智種厚培栽特入娑婆行一遍紅塵堆裏不沾埃無量壽放光明願王六八攝羣生佛號一聲才脫口寶蓮臺上已標名摩尼珠已入手晝夜循環無近久一朝捻破見渠儂方知這箇是本有這漢子自樂天寬袍博袖任翩翩神彩煥然誰認得亭亭出水一青蓮曾公霑居士行樂贊五陵公子各競紛華滔滔不返窮欲極奢惟我曾子生於貴胄恬淡怡神聲色莫囿娑婆界上徐步經行摩尼在手常放光明憶念彌陀是大悲父處處提擕勝於慈母黃金地上七寶池中蓮開四色陳陳香風一聲佛號攝無量佛佛佛現前原非他物即心即佛即佛即心靈明淨妙蓋古蓋今曾公永居士行樂贊少年公子事鉛槧幾入文場恣鏖戰誓將唾手取功名筆陳鋒鋩如閃電乃知瞿曇勝妙門研窮至理徹根源不為遊絲繫大象變化擬追北溟鯤復知徑路在淨業此是法王真祕訣萬修萬到信無疑廣長舌相真實説又具同體大悲心西航渡子自標名普載羣生登覺岸是謂無生無不生吾觀世上奇男子文心美質人難比那能一念自回機肯向箇中究實理曾子夙植慧根深伯仲同修更邁倫世出世間無罣礙塤箎迭奏韻長新普通年蓮社圖贊有敘茫茫苦海回頭登岸者寧有幾人狠狠殺機垂念含生者實為罕見普通延平古剎城中諸善男子每月兩集覺皇寶殿同修念佛放生法門放生也全自己一念慈悲之心出含生刀砧之苦念佛也復本源廣大清淨之性立華開見佛之因事出一時功存永劫真娑婆界中不思議功德也會中諸善友繪畫蓮社圖一幅張於寺中以志一時盛事傳余陋質坐於中方而諸公各肖其像圍繞座下俾見者儼然極樂國中諸上善人俱會一處經聲佛號琅琅然喚醒夢中之人魚躍鳶飛飄飄然裂破漫天之網植人天勝福立淨土正因端基於是矣贊曰三界火宅熱惱攸長一聲佛號當處清涼蠢茲異類受屠割苦一念慈悲縱之天府維茲二者人天勝田勤修不懈福慧綿延究竟同歸西方極樂蓮華化生因果不錯諸上善人俱會一處世世生生以法相遇咨爾佛子廣化同仁同修同證斯道利貞體如堅公道影贊童真入道六十餘年居塵不染有若青蓮密修禪淨心無間然來往石鼓逸興翩翩德望既著掌教於延夫是之謂體如如而不動歷萬變而常堅者也惟靜和尚贊這箇漢實希奇得先師不傳之祕息末世躁進之機十載住山一鎮之以靜念期弘戒普攝之以慈言行既寡尤悔道德直造玄微噫來學滔滔去不返幾人於此仰真規自贊這漢子沒來由末法無端強出頭向孤峯頂上直鈎釣鯉入大洋海底撥火煮漚事人之所不事憂人之所不憂獨立天壤之內三十年覔不得一箇同儔似恁麼不唧𠺕只好貶向那畔又那畔安用形上紙墨觸汙他眸呵呵古洞且存這一滴莫教舉世盡隨流
